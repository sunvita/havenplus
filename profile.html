<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HAVENPLUS">
<meta name="theme-color" content="#1B2A4A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<title>Haven Plus — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<style>
  :root {
    --navy: #1B2A4A; --navy-light: #2a3f6a;
    --orange: #ff6b35; --orange-light: #f7931e;
    --bg: #f5f6fa; --surface: #ffffff;
    --border: #e8eaed; --text: #1a1a1a;
    --text-light: #666; --green-bg: #e8f5e9; --green-txt: #1e5c3a;
    --red: #c0392b; --red-bg: #fff5f5;
    --blue-bg: #e8f0fb; --blue-txt: #1B2A4A;
    --success: #27ae60; --warning: #f39c12;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: clip; scroll-behavior: smooth; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

  /* ── Loading ── */
  .loading-screen { position: fixed; inset: 0; background: var(--navy); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
  .loading-screen.hide { opacity: 0; pointer-events: none; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.2); border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Nav (identical to dashboard) ── */
  .dash-nav { background: linear-gradient(135deg, var(--navy), var(--navy-light)); height: 64px; display: flex; align-items: center; justify-content: center; padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
  .dash-nav-inner { max-width: 1000px; width: 100%; display: flex; align-items: center; justify-content: space-between; }
  .dash-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .dash-logo svg { width: 32px; height: 32px; }
  .dash-brand { font-size: 18px; font-weight: 900; color: white; letter-spacing: 1px; line-height: 1; }
  .dash-brand span { font-weight: 300; opacity: .6; }
  .dash-brand-sub { font-size: 8px; font-weight: 700; letter-spacing: 3px; color: rgba(255,255,255,.55); text-transform: uppercase; }
  .dash-nav-right { display: flex; align-items: center; gap: 12px; }
  .dash-user-name { color: rgba(255,255,255,.8); font-size: 13px; font-weight: 500; }
  @media (max-width: 480px) { .dash-user-name { display: none; } }
  .nav-btn { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.8); padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 5px; height: 32px; }
  .nav-btn:hover { background: rgba(255,255,255,.2); color: white; }
  .nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .nav-btn-label { }
  @media (max-width: 600px) { .nav-btn-label { display: none; } .nav-btn { padding: 6px 8px; } }
  .nav-lang-toggle { display: flex; gap: 2px; background: rgba(255,255,255,.08); border-radius: 7px; padding: 3px; margin: 0 4px; }
  .nav-lang-btn { color: rgba(255,255,255,.4); font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 5px; cursor: pointer; transition: all .2s; }
  .nav-lang-btn.active { background: rgba(255,255,255,.18); color: white; }

  /* ── Notification Bell ──────────────────────────────── */
  .notif-bell { position: relative; cursor: pointer; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 8px; padding: 6px 8px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .notif-bell:hover { background: rgba(255,255,255,.2); }
  .notif-bell svg { width: 16px; height: 16px; color: rgba(255,255,255,.85); }
  .notif-badge { position: absolute; top: -4px; right: -4px; background: #ff4757; color: white; font-size: 9px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid var(--navy); }
  .notif-badge:empty { display: none; }
  .notif-dropdown { display: none; position: absolute; top: calc(100% + 10px); right: 0; background: white; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.18); width: 340px; max-height: 420px; overflow-y: auto; z-index: 400; }
  .notif-dropdown.open { display: block; }
  .notif-dropdown-header { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
  .notif-dropdown-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
  .notif-mark-all { font-size: 11px; color: #666; cursor: pointer; background: none; border: none; font-family: inherit; }
  .notif-mark-all:hover { color: #1a3c5e; }
  .notif-item { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background .15s; display: flex; gap: 10px; align-items: flex-start; }
  .notif-item:hover { background: #f9fafb; }
  .notif-item.unread { background: #f0f7ff; }
  .notif-item.unread:hover { background: #e5f0fd; }
  .notif-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
  .notif-icon.scheduled { background: #e8f5e9; }
  .notif-icon.reminder { background: #fff3e0; }
  .notif-icon.completed { background: #e3f2fd; }
  .notif-content { flex: 1; min-width: 0; }
  .notif-title { font-size: 13px; font-weight: 600; color: #1a1a1a; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
  .notif-message { font-size: 11px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .notif-time { font-size: 11px; color: #999; margin-top: 2px; }
  .notif-empty { padding: 32px 16px; text-align: center; color: #aaa; font-size: 13px; }
  .notif-view-all { display: block; text-align: center; padding: 12px; font-size: 12px; font-weight: 600; color: var(--navy); text-decoration: none; border-top: 1px solid #f0f0f0; }
  .notif-view-all:hover { background: #f9fafb; }
  @media (max-width: 480px) { .notif-dropdown { width: 300px; right: -40px; } }

  /* ── Notifications Page ──────────────────────────────── */
  .notif-filter-btn { padding: 7px 14px; font-size: 12px; font-weight: 600; font-family: inherit; border: none; background: white; color: var(--text-light); cursor: pointer; transition: all .15s; }
  .notif-filter-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .notif-filter-btn.active { background: var(--navy); color: white; }
  .notif-filter-btn:hover:not(.active) { background: #f5f5f5; }
  .notif-page-item { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; gap: 14px; align-items: flex-start; transition: background .15s; cursor: default; }
  .notif-page-item:last-child { border-bottom: none; }
  .notif-page-item.unread { background: #f0f7ff; }
  .notif-page-item .notif-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .notif-page-item .np-content { flex: 1; min-width: 0; }
  .notif-page-item .np-title { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
  .notif-page-item .np-message { font-size: 12px; color: var(--text-light); margin-top: 3px; line-height: 1.4; }
  .notif-page-item .np-time { font-size: 11px; color: #aaa; margin-top: 4px; }
  .notif-page-item .np-actions { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }

  /* ── Layout ── */
  .page { max-width: 1000px; margin: 0 auto; padding: 32px 20px; display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }

  /* ── Sidebar ── */
  .sidebar { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; position: sticky; top: 88px; }
  .sidebar-profile { padding: 20px; border-bottom: 1px solid var(--border); }
  .sidebar-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--orange), var(--orange-light)); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 800; margin-bottom: 10px; }
  .sidebar-name { font-size: 14px; font-weight: 700; color: var(--navy); }
  .sidebar-email { font-size: 12px; color: var(--text-light); margin-top: 2px; word-break: break-all; }
  .sidebar-nav { padding: 8px 0; }
  .sidebar-section { font-size: 10px; font-weight: 700; color: var(--text-light); letter-spacing: .08em; text-transform: uppercase; padding: 10px 20px 4px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text); background: none; border: none; cursor: pointer; font-family: inherit; transition: background .15s; }
  .sidebar-item:hover { background: #f5f7fa; color: var(--navy); }
  .sidebar-item.active { background: var(--blue-bg); color: var(--navy); font-weight: 700; border-right: 3px solid var(--navy); }
  .sidebar-item.danger { color: var(--red); }
  .sidebar-item.danger:hover { background: var(--red-bg); }
  .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .6; }
  .sidebar-item.active svg { opacity: 1; }
  .sidebar-divider { height: 1px; background: var(--border); margin: 6px 0; }

  /* ── Content ── */
  .content { display: flex; flex-direction: column; gap: 0; }
  .section { display: none; }
  .section.active { display: block; }
  .section-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 28px; margin-bottom: 16px; }

  /* ── Payments Section ── */
  .pay-filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .pay-filter-group { display: flex; gap: 6px; align-items: center; }
  .pay-filter-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .06em; }
  .pay-select { padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; background: white; color: var(--text); cursor: pointer; }
  .pay-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .pay-sum-card { background: var(--bg); border-radius: 10px; padding: 14px 16px; }
  .pay-sum-label { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .pay-sum-value { font-size: 20px; font-weight: 800; color: var(--navy); }
  .pay-sum-value.red { color: var(--red); }
  .pay-sum-value.green { color: #1e5c3a; }
  .pay-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  .pay-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pay-table th { background: var(--bg); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .pay-table td { padding: 12px 14px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  .pay-table tr:last-child td { border-bottom: none; }
  .pay-table tr:hover td { background: var(--bg); }
  .pay-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .pay-badge.paid { background: #e8f5e9; color: #1e5c3a; }
  .pay-badge.refunded { background: #fff3e0; color: #e65100; }
  .pay-badge.partial_refunded { background: #fff8e1; color: #f57f17; }
  .pay-badge.pending_refund { background: #e3f2fd; color: #1565c0; }
  .pay-badge.additional_pending { background: #fce4ec; color: #880e4f; }
  .pay-badge.additional_paid { background: #e8f5e9; color: #1e5c3a; }
  .pay-badge.cancelled { background: #f5f5f5; color: #666; }
  .pay-type-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: var(--blue-bg); color: var(--navy); }
  .pay-btn { padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; font-family: inherit; border: none; cursor: pointer; transition: all .15s; }
  .pay-btn.refund { background: #fff3e0; color: #e65100; }
  .pay-btn.refund:hover { background: #ffe0b2; }
  .pay-btn.charge { background: var(--blue-bg); color: var(--navy); }
  .pay-btn.charge:hover { background: #c5d8f7; }
  .pay-empty { text-align: center; padding: 48px; color: var(--text-light); font-size: 14px; }

  /* Refund Modal */
  .pay-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
  .pay-modal { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 480px; }
  .pay-modal-title { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 20px; }
  .pay-modal-row { margin-bottom: 14px; }
  .pay-modal-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
  .pay-modal-value { font-size: 14px; font-weight: 600; color: var(--text); }
  .pay-modal-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
  .pay-modal-input:focus { outline: none; border-color: var(--navy); }
  .pay-modal-calc { background: var(--bg); border-radius: 10px; padding: 14px; margin: 16px 0; font-size: 13px; line-height: 1.8; }
  .pay-modal-calc strong { font-weight: 700; color: var(--navy); }
  .pay-modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .pay-modal-btn { padding: 10px 20px; border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit; border: none; cursor: pointer; }
  .pay-modal-btn.cancel { background: var(--bg); color: var(--text); }
  .pay-modal-btn.confirm { background: var(--navy); color: white; }
  .pay-modal-btn.confirm:hover { background: var(--navy-light); }
  .pay-modal-btn:disabled { opacity: .5; cursor: not-allowed; }
  .section-title { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
  .section-desc { font-size: 13px; color: var(--text-light); margin-bottom: 24px; }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .05em; }
  .form-input { padding: 10px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--text); transition: border-color .2s; outline: none; }
  .form-input:focus { border-color: var(--orange); }
  .form-input:disabled { background: #f9fafb; color: var(--text-light); cursor: not-allowed; }
  .form-hint { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-save { background: var(--navy); color: white; border: none; padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .2s; }
  .btn-save:hover { background: var(--navy-light); }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }
  .btn-cancel { background: none; color: var(--text-light); border: 2px solid var(--border); padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
  .btn-cancel:hover { border-color: var(--text-light); color: var(--text); }

  /* ── Alerts ── */
  .alert { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }
  .alert-error { background: #fee; color: var(--red); }
  .alert-success { background: var(--green-bg); color: var(--green-txt); }

  /* ── Subscription card ── */
  .sub-card { background: var(--bg); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .sub-card-header { margin-bottom: 12px; }
  .sub-card-header-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sub-plan-name { font-size: 16px; font-weight: 800; color: var(--navy); }
  .sub-plan-price { font-size: 14px; font-weight: 700; color: var(--navy); }
  .sub-badge { display: inline-block; background: var(--green-bg); color: var(--green-txt); font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; letter-spacing: .05em; text-transform: uppercase; }
  .sub-details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .sub-detail-item { font-size: 13px; color: var(--text-light); }
  .sub-detail-item strong { display: block; font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .sub-note { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* ── Payment ── */
  .payment-btn { display: flex; align-items: center; gap: 12px; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 16px 20px; cursor: pointer; font-family: inherit; width: 100%; text-align: left; transition: border-color .2s; margin-bottom: 12px; }
  .payment-btn:hover { border-color: var(--navy); }
  .payment-btn-icon { width: 40px; height: 40px; background: var(--navy); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .payment-btn-text { font-size: 14px; font-weight: 700; color: var(--navy); }
  .payment-btn-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .payment-status { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
  .payment-status.connected { background: var(--green-bg); color: var(--green-txt); }
  .payment-status.not-connected { background: #fff3e0; color: #e65100; }

  /* ── Security ── */
  .security-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); }
  .security-row:last-child { border-bottom: none; }
  .security-label { font-size: 14px; font-weight: 700; color: var(--text); }
  .security-value { font-size: 13px; color: var(--text-light); margin-top: 2px; }
  .btn-change { background: none; border: 2px solid var(--border); color: var(--text); padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; }
  .btn-change:hover { border-color: var(--navy); color: var(--navy); }

  /* ── Password & Email form (inline) ── */
  .inline-form { display: none; margin-top: 16px; padding: 20px; background: var(--bg); border-radius: 12px; }
  .inline-form.open { display: block; }
  .pw-field { position: relative; margin-bottom: 12px; }
  .pw-field label { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 6px; }
  .pw-wrap { position: relative; }
  .pw-wrap input { width: 100%; padding: 10px 44px 10px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color .2s; }
  .pw-wrap input:focus { border-color: var(--orange); }
  .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; color: var(--text-light); }

  /* ── Delete ── */
  .delete-warning { background: var(--red-bg); border: 1px solid #f5c6cb; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .delete-warning p { font-size: 13px; color: #721c24; line-height: 1.6; }
  .delete-warning p + p { margin-top: 8px; }
  .btn-delete { background: var(--red); color: white; border: none; padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-block; }
  .btn-delete:hover { background: #a93226; }

  /* ── Admin ── */
  .admin-badge { display: inline-block; background: #dbeafe; color: #1B2A4A; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .03em; text-transform: uppercase; margin-left: 8px; vertical-align: middle; }
  
  /* ── CTA Cards (Dashboard) ── */
  .cta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; }

function suggestAreaForSuburb(suburb) {
  if (!suburb) return { area: null, confidence: 'none' };
  const normalized = suburb.trim();
  
  // Exact match
  for (const [code, data] of Object.entries(PERTH_AREAS)) {
    if (data.suburbs.some(s => s.toLowerCase() === normalized.toLowerCase())) {
      return { area: code, confidence: 'high', name: data.name };
    }
  }
  
  // Partial match (e.g., "East Cannington" matches "Cannington")
  const baseName = normalized.replace(/^(East|West|North|South)\s+/i, '');
  for (const [code, data] of Object.entries(PERTH_AREAS)) {
    if (data.suburbs.some(s => 
      s.toLowerCase().includes(baseName.toLowerCase()) || 
      baseName.toLowerCase().includes(s.toLowerCase())
    )) {
      return { area: code, confidence: 'medium', name: data.name };
    }
  }
  
  return { area: null, confidence: 'none' };
}

function getAreaName(code) {
  return PERTH_AREAS[code]?.name || code || '—';
}

/* Enhanced area matching — shared by Worker and Property area assignment */
function enhancedAreaMatch(suburb, address) {
  /* 1. Try suburb directly */
  if (suburb) {
    const result = suggestAreaForSuburb(suburb);
    if (result.area) return result;
  }
  /* 2. Try full address as-is */
  if (address) {
    const result = suggestAreaForSuburb(address);
    if (result.area) return result;
    /* 3. Parse from comma-separated */
    const parts = address.split(',').map(p => p.trim());
    for (let i = parts.length - 1; i >= 0; i--) {
      const clean = parts[i].replace(/\s*(WA|VIC|NSW|QLD|SA|TAS|NT|ACT)\s*\d{4}\s*$/i, '').trim();
      if (clean) {
        const r = suggestAreaForSuburb(clean);
        if (r.area) return r;
      }
    }
    /* 4. Word-by-word scan including two-word combos */
    const words = address.replace(/[,\d]/g, '').split(/\s+/).filter(w => w.length > 2);
    for (let i = words.length - 1; i >= 0; i--) {
      const r = suggestAreaForSuburb(words[i]);
      if (r.area) return r;
      if (i > 0) {
        const r2 = suggestAreaForSuburb(words[i-1] + ' ' + words[i]);
        if (r2.area) return r2;
      }
    }
  }
  return { area: null, confidence: 'none' };
}

async function saveGalleryPin() {

  const pinConfirm = document.getElementById('galleryPinConfirm').value;
  const err = document.getElementById('galleryPinError');

let manageUnlocked = false;
let storedPinHash = null;

async function loadAdminPin() {
  if (!sb || !isAdmin) return;
  try {
    const { data } = await sb.from('admin_settings').select('value').eq('key', 'override_pin').maybeSingle();
    storedPinHash = data?.value || null;
  } catch(e) { /* table may not exist yet */ }
}

function openPinGate() {
  const inputs = document.querySelectorAll('#pinInputGroup .pin-input');
  inputs.forEach(i => i.value = '');
  const alert = document.getElementById('pinGateAlert');
  alert.className = 'modal-alert';
  alert.textContent = '';
  document.getElementById('pinGateModal').classList.add('open');
  setTimeout(() => inputs[0]?.focus(), 100);
}

function closePinGate() {
  document.getElementById('pinGateModal').classList.remove('open');
}

function onPinInput(el, idx) {
  el.value = el.value.replace(/[^0-9]/g, '');
  if (el.value && idx < 3) {
    document.querySelectorAll('#pinInputGroup .pin-input')[idx + 1].focus();
  }
}

function onPinKeydown(e, idx) {
  if (e.key === 'Backspace' && !e.target.value && idx > 0) {
    document.querySelectorAll('#pinInputGroup .pin-input')[idx - 1].focus();
  }
  if (e.key === 'Enter') verifyPin();
}

async function verifyPin() {
  const inputs = document.querySelectorAll('#pinInputGroup .pin-input');
  const pin = Array.from(inputs).map(i => i.value).join('');
  const alert = document.getElementById('pinGateAlert');

  if (pin.length !== 4) {
    alert.className = 'modal-alert error';
    alert.textContent = 'Please enter a 4-digit PIN.';
    return;
  }

  // If no PIN set yet, accept any and prompt to set one
  if (!storedPinHash) {
    manageUnlocked = true;
    closePinGate();
    switchSection('manage');
    showToast('No PIN set yet. Please set one in Security settings.', true);
    return;
  }

  const hash = await hashPin(pin);
  if (hash === storedPinHash) {
    manageUnlocked = true;
    closePinGate();
    switchSection('manage');
  } else {
    alert.className = 'modal-alert error';
    alert.textContent = 'Incorrect PIN.';
    inputs.forEach(i => i.value = '');
    inputs[0].focus();
  }
}

async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin + '_havenplus_override');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function loadSubscription() {
  const el = document.getElementById('subContent');
  el.innerHTML = '<div style="color:#888;font-size:14px;">Loading…</div>';

  try {
    // Fetch all active subscriptions (user may have multiple properties)
    const { data: subs, error: subErr } = await sb
      .from('subscriptions')
      .select('plan_type, status, start_date, end_date, cleaning_hours_total, cleaning_hours_used, sh_hours_total, sh_hours_used, preferred_week, confirmed_date, cleaning_start_month, property_id')
      .eq('user_id', currentUser.id)
      .eq('status', 'active');

    if (subErr) throw subErr;

    let shBal = null;
    try {
      const { data } = await sb.from('sh_balance').select('purchased_total, purchased_used').eq('user_id', currentUser.id).maybeSingle();
      shBal = data;
    } catch(e) { /* sh_balance table may not exist yet */ }

    // Fetch properties for name display
    let props = [];
    try {
      const { data } = await sb.from('properties').select('id, address, suburb').eq('user_id', currentUser.id);
      props = data || [];
    } catch(e) {}
    const propMap = {};
    props.forEach(p => { propMap[p.id] = `${p.address}, ${p.suburb}`; });

    if ((!subs || subs.length === 0) && !shBal) {
      el.innerHTML = '<p style="font-size:14px;color:#888;">No active subscription found. <a href="plans.html" style="color:var(--navy);font-weight:600;">View plans →</a></p>';
      return;
    }

    let html = '';

    if (subs && subs.length > 0) {
      subs.forEach(sub => {
        const plan = PLAN_META[sub.plan_type] || { name: sub.plan_type, price:'—', visits:'—', hours:'—', vouchers:'—' };
        const endDate = sub.end_date
          ? new Date(sub.end_date).toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'})
          : '—';
        const startDate = sub.start_date
          ? new Date(sub.start_date).toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'})
          : '—';
        const cleanRem   = Math.round(((sub.cleaning_hours_total || 0) - (sub.cleaning_hours_used || 0)) * 10) / 10;
        const shVouchRem = Math.round(((sub.sh_hours_total || 0) - (sub.sh_hours_used || 0)) * 10) / 10;
        const propLabel  = sub.property_id && propMap[sub.property_id] ? propMap[sub.property_id] : '';

        // Next payment date calculation
        let nextPayDate = '—';
        if (sub.start_date) {
          const sd = new Date(sub.start_date);
          const now = new Date();
          const isAnnual = sub.plan_type === 'premium';
          if (isAnnual) {
            // Annual: next anniversary of start_date
            const next = new Date(sd);
            next.setFullYear(now.getFullYear());
            if (next <= now) next.setFullYear(now.getFullYear() + 1);
            nextPayDate = next.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
          } else {
            // Monthly: next month anniversary of start_date
            const next = new Date(sd);
            next.setMonth(now.getMonth());
            next.setFullYear(now.getFullYear());
            if (next <= now) next.setMonth(next.getMonth() + 1);
            nextPayDate = next.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
          }
        }

        html += `
          <div class="sub-card">
            <div class="sub-card-header">
              <div class="sub-card-header-top">
                <div class="sub-plan-name">${plan.name}</div>
                <div class="sub-plan-price">${plan.price}</div>
                <span class="sub-badge">${sub.status}</span>

            </div>
            <div class="sub-details">
              <div class="sub-detail-item">Cleaning hours left<strong>${cleanRem} hrs</strong></div>
              <div class="sub-detail-item">SH vouchers left<strong>${shVouchRem} hrs</strong></div>
              <div class="sub-detail-item">Start date<strong>${startDate}</strong></div>
              <div class="sub-detail-item">Contract ends<strong>${endDate}</strong></div>
              <div class="sub-detail-item">Visits / year<strong>${plan.visits}</strong></div>
              <div class="sub-detail-item">Next payment<strong>${nextPayDate}</strong></div>
            </div>
          </div>`;
      });
    }

    if (shBal) {
      const shPurchRem = (shBal.purchased_total || 0) - (shBal.purchased_used || 0);
      const shPurchUsed = shBal.purchased_used || 0;
      if (shPurchRem > 0 || shPurchUsed > 0) {
        html += `

            <div class="sub-card-header">
              <div>
                <div class="sub-plan-name">Purchased Service Hours</div>
              </div>

              <div class="sub-detail-item">SH used<strong>${shPurchUsed} hrs</strong></div>
            </div>

      subLink.addEventListener('click', function(e) {
        e.preventDefault();
        window.location = this.href;

    console.error('loadSubscription error:', e);
    el.innerHTML = '<p style="font-size:14px;color:#c0392b;">Failed to load subscription info. Please try again.</p>';
  }

async function openPortal() {
  const btn = document.getElementById('portalBtn');
  const statusEl = document.getElementById('portalStatus');

  showToast('Redirecting to payment portal…');
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) throw new Error('Session expired. Please log in again.');

    const res = await fetch(SUPABASE_URL + '/functions/v1/create-portal-session', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token
      },
      body: JSON.stringify({ user_id: currentUser.id }),
    });

    if (!res.ok) {
      const status = res.status;
      if (status === 404) throw new Error('no_subscription');
      throw new Error('Server error: ' + status);
    }

    const data = await res.json();
    if (data.error && data.error.includes('No active subscription')) throw new Error('no_subscription');
    if (data.error) throw new Error(data.error);
    if (!data.url)  throw new Error('No portal URL returned.');

    window.open(data.url, '_blank');
  } catch(e) {
    console.warn('Portal error:', e.message);

    statusEl.style.display = 'flex';
    if (e.message === 'no_subscription') {
      statusEl.className = 'payment-status not-connected';
      document.getElementById('portalStatusText').innerHTML =
        'No active subscription found. <a href="plans.html" style="color:var(--navy);font-weight:600;">Choose a plan →</a>';
    } else {
      statusEl.className = 'payment-status not-connected';
      document.getElementById('portalStatusText').textContent =
        'Payment portal unavailable right now. Please contact hi@havenpluscare.com';
    }
  }
}

    // Supabase 원문 메시지 → 친절한 메시지로 변환
    let msg = error.message;
    if (msg.includes('at least one character') || msg.includes('password') && msg.includes('character')) {
      msg = 'Password must include uppercase, lowercase, and a number. Special characters optional (e.g. MyPass123 or MyPass@123).';
    } else if (msg.includes('at least 6') || msg.includes('at least 8')) {
      msg = 'Password must be at least 8 characters.';
    } else if (msg.includes('same as old') || msg.includes('different')) {
      msg = 'New password must be different from your current password.';
    }
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }
  else {
    sucEl.textContent = 'Password updated successfully.';
    sucEl.style.display = 'block';
    document.getElementById('pwNew').value = '';
    document.getElementById('pwConfirm').value = '';
    setTimeout(() => { sucEl.style.display = 'none'; togglePwForm(); }, 2000);
  }
}

  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function loadSchedules() {
  if (!isAdmin) return;
  const body = document.getElementById('schedulesBody');
  const status = document.getElementById('schedStatusFilter').value;
  const worker = document.getElementById('schedWorkerFilter').value;
  const area = document.getElementById('schedAreaFilter').value;
  const period = document.getElementById('schedPeriodFilter').value;
  
  body.innerHTML = '<tr><td colspan="9" class="empty-state">Loading…</td></tr>';

  // Load workers for dropdown if not already loaded
  if (!allWorkers.length) await loadWorkersForDropdowns();
  
  // Initialize area dropdowns
  initAreaDropdowns();

  // Calculate date range
  let dateFrom = null, dateTo = null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  if (period === '1m') {
    // This month: from 1st of current month to end of current month
    dateFrom = new Date(today.getFullYear(), today.getMonth(), 1);
    dateTo = new Date(today.getFullYear(), today.getMonth() + 1, 0); // last day of month
  } else if (period === '2m') {
    // Until next month: from 1st of current month to end of next month
    dateFrom = new Date(today.getFullYear(), today.getMonth(), 1);
    dateTo = new Date(today.getFullYear(), today.getMonth() + 2, 0);
  } else if (period === 'custom') {
    const fromVal = document.getElementById('schedDateFrom').value;
    const toVal = document.getElementById('schedDateTo').value;
    if (fromVal) dateFrom = new Date(fromVal);
    if (toVal) dateTo = new Date(toVal);
  }
  // 'all' = no date filter

  /* Fetch two sets: overdue incomplete + date-filtered */
  const selectCols = 'id, planned_date, planned_time, duration_hours, actual_duration, status, property_id, assigned_worker_id, assigned_workers, user_id, before_photos, after_photos, worker_notes, reschedule_requested, reschedule_proposed_date, reschedule_note, reschedule_count';
  const todayStr = new Date().toISOString().split('T')[0];

  let q = sb.from('cleaning_schedule').select(selectCols)
    .order('planned_date', { ascending: true }).limit(200);

  if (status) q = q.eq('status', status);
  if (dateFrom) q = q.gte('planned_date', dateFrom.toISOString().split('T')[0]);
  if (dateTo) q = q.lte('planned_date', dateTo.toISOString().split('T')[0]);

  /* Also fetch overdue incomplete (past date + not completed/cancelled) */
  let overdueQ = null;
  if (dateFrom && !status) {
    overdueQ = sb.from('cleaning_schedule').select(selectCols)
      .lt('planned_date', todayStr)
      .in('status', ['requested', 'scheduled', 'confirmed'])
      .order('planned_date', { ascending: true }).limit(50);
  }
  
  const [mainRes, overdueRes] = await Promise.all([
    q, overdueQ || Promise.resolve({ data: [] })
  ]);

  /* Merge and deduplicate by id */
  const seenIds = new Set();
  const data = [];
  for (const item of [...(overdueRes.data || []), ...(mainRes.data || [])]) {
    if (!seenIds.has(item.id)) { seenIds.add(item.id); data.push(item); }
  }
  /* Sort: overdue first, then by date */
  data.sort((a, b) => new Date(a.planned_date) - new Date(b.planned_date));

  if (!data?.length) {
    body.innerHTML = '<tr><td colspan="9" class="empty-state">No schedules found for this period.</td></tr>'; 
    return; 
  }

  // Get property info (including area, bedrooms, bathrooms)
  const propIds = [...new Set(data.map(r => r.property_id).filter(Boolean))];
  const userIds = [...new Set(data.map(r => r.user_id).filter(Boolean))];
  
  let propMap = {}, profileMap = {};
  if (propIds.length) {
    const { data: props } = await sb.from('properties').select('id, address, suburb, area, bedrooms, bathrooms').in('id', propIds);
    (props || []).forEach(p => propMap[p.id] = p);
  }
  if (userIds.length) {
    const { data: profiles } = await sb.from('profiles').select('id, full_name').in('id', userIds);
    (profiles || []).forEach(p => profileMap[p.id] = p);
  }

  const workerMap = {};
  allWorkers.forEach(w => workerMap[w.id] = w);

  // Filter by area and worker (client-side for assigned_workers support)
  let filteredData = data;
  
  // Worker filter - check both assigned_worker_id and assigned_workers array
  if (worker) {
    filteredData = filteredData.filter(r => {
      // Check assigned_workers JSONB array first
      if (r.assigned_workers && Array.isArray(r.assigned_workers) && r.assigned_workers.length > 0) {
        return r.assigned_workers.includes(worker);
      }
      // Fallback to assigned_worker_id
      return r.assigned_worker_id === worker;
    });
  }
  
  // Area filter
  if (area) {
    filteredData = filteredData.filter(r => {
      const prop = propMap[r.property_id];
      return prop?.area === area;
    });
  }

  // Stats (based on filtered data)
  const pending = filteredData.filter(s => s.status === 'requested').length;
  const scheduled = filteredData.filter(s => s.status === 'scheduled' || s.status === 'confirmed').length;
  const completed = filteredData.filter(s => s.status === 'completed').length;
  const thisMonth = filteredData.filter(s => {
    if (!s.planned_date) return false;
    const d = new Date(s.planned_date);
    const now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  
  document.getElementById('statSchedPending').textContent = pending;
  document.getElementById('statSchedScheduled').textContent = scheduled;
  document.getElementById('statSchedCompleted').textContent = completed;
  document.getElementById('statSchedThisMonth').textContent = thisMonth;

  allSchedules = data.map(r => ({ ...r, prop: propMap[r.property_id] }));

  if (!filteredData.length) {
    body.innerHTML = '<tr><td colspan="9" class="empty-state">No schedules found for selected filters.</td></tr>';
    return;
  }

  body.innerHTML = filteredData.map(r => {
    const d = r.planned_date ? new Date(r.planned_date).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const prop = propMap[r.property_id];
    const propLabel = prop ? `${prop.address}, ${prop.suburb}` : '—';
    const areaName = prop?.area ? getAreaName(prop.area) : '—';
    const areaClass = prop?.area ? `area-cell area-bg-${prop.area}` : 'area-cell area-bg-unknown';
    const customer = profileMap[r.user_id]?.full_name || '—';
    
    // Display multiple workers
    let workerDisplay = 'Unassigned';
    const workerIds = (r.assigned_workers && Array.isArray(r.assigned_workers) && r.assigned_workers.length > 0)
      ? r.assigned_workers
      : (r.assigned_worker_id ? [r.assigned_worker_id] : []);
    
    if (workerIds.length === 1) {
      workerDisplay = workerMap[workerIds[0]]?.full_name || 'Unassigned';
    } else if (workerIds.length > 1) {
      const names = workerIds.map(wid => workerMap[wid]?.full_name || '?').filter(Boolean);
      workerDisplay = `${names[0]} +${names.length - 1}`;
    }
    
    const badgeClass = r.status === 'completed' ? 'completed' : r.status === 'cancelled' ? 'cancelled' : r.status === 'requested' ? 'pending' : 'scheduled';
    
    return `<tr>
      <td style="font-weight:600;">${d}</td>
      <td>${r.planned_time || '—'}</td>
      <td class="${areaClass}">${areaName}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${propLabel}">${propLabel}</td>
      <td>${customer}</td>
      <td>${workerDisplay}</td>
      <td style="font-size:12px;white-space:nowrap;">${r.duration_hours || '—'}h${r.actual_duration ? ' → <strong>' + (Math.round(r.actual_duration * 10) / 10) + 'h</strong>' : ''}</td>
      <td><span class="badge badge-${badgeClass}">${r.status || '—'}</span></td>
      <td class="action-cell">
        <button class="btn-action-sm" onclick="openSchedEditModal('${r.id}')">Edit</button>
      </td>
    </tr>`;
  }).join('');
}

/* ══ Admin: Calendar ═══════════════════════════════════════ */
let calendar = null;
let calendarData = { scheduled: [], unscheduled: [] };

const AREA_COLORS = {
  'SE_INNER': '#3F51B5', 'EAST': '#3F51B5',
  'INNER_SOUTH': '#2196F3', 'SE_MID': '#2196F3', 'CBD': '#1976D2',
  'SE_OUTER': '#009688', 'MELVILLE': '#00897B', 'NE_INNER': '#00796B', 'ARMADALE': '#00695C',
  'NE_MID': '#4CAF50', 'WEST': '#43A047', 'COCKBURN': '#388E3C', 'FREMANTLE': '#2E7D32',
  'NE_OUTER': '#FFEB3B', 'NORTH_INNER': '#FDD835',
  'NORTH_OUTER': '#FF9800', 'ROCKINGHAM': '#F44336'
};

async function loadCalendar() {
  if (!isAdmin) return;
  
  // Load workers for dropdowns
  if (!allWorkers.length) await loadWorkersForDropdowns();
  
  // Populate calendar filters
  initAreaDropdowns();
  const calWorkerFilter = document.getElementById('calWorkerFilter');
  if (calWorkerFilter) {
    calWorkerFilter.innerHTML = '<option value="">All workers</option>' + 
      allWorkers.map(w => `<option value="${w.id}">${w.full_name}</option>`).join('');
  }
  
  // Load cleaning data
  const { data: schedules } = await sb.from('cleaning_schedule')
    .select('id, planned_date, planned_time, duration_hours, status, property_id, assigned_worker_id, user_id')
    .order('planned_date', { ascending: true });
  
  if (!schedules) return;
  
  // Get property info
  const propIds = [...new Set(schedules.map(s => s.property_id).filter(Boolean))];
  let propMap = {};
  if (propIds.length) {
    const { data: props } = await sb.from('properties').select('id, address, suburb, area, bedrooms, bathrooms').in('id', propIds);
    (props || []).forEach(p => propMap[p.id] = p);
  }
  
  // Separate scheduled vs unscheduled
  calendarData.scheduled = schedules.filter(s => s.planned_date && s.status !== 'requested').map(s => ({
    ...s, prop: propMap[s.property_id] || {}
  }));
  calendarData.unscheduled = schedules.filter(s => !s.planned_date || s.status === 'requested').map(s => ({
    ...s, prop: propMap[s.property_id] || {}
  }));
  
  // Render unscheduled panel
  renderUnscheduledPanel();
  
  // Initialize or update calendar
  if (!calendar) {
    initCalendar();
  } else {
    refreshCalendarEvents();
  }
}

function initCalendar() {
  const calendarEl = document.getElementById('calendarContainer');
  
  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'timeGridWeek',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay'
    },
    slotMinTime: '07:00:00',
    slotMaxTime: '19:00:00',
    slotDuration: '00:30:00',
    allDaySlot: false,
    weekends: true,
    editable: true,
    droppable: true,
    eventDurationEditable: true,
    selectable: true,
    selectMirror: true,
    nowIndicator: true,
    events: getCalendarEvents(),
    
    // Event drop (reschedule)
    eventDrop: async function(info) {
      const schedId = info.event.id;
      const newDate = info.event.start.toISOString().split('T')[0];
      const newTime = info.event.start.toTimeString().slice(0,5);
      
      const { error } = await sb.from('cleaning_schedule').update({
        planned_date: newDate,
        planned_time: newTime
      }).eq('id', schedId);
      
      if (error) {
        showToast('Failed to reschedule', true);
        info.revert();
      } else {
        showToast('Cleaning rescheduled');
      }
    },
    
    // Event resize (change duration)
    eventResize: async function(info) {
      const schedId = info.event.id;
      const duration = (info.event.end - info.event.start) / (1000 * 60 * 60);
      
      const { error } = await sb.from('cleaning_schedule').update({
        duration_hours: duration
      }).eq('id', schedId);
      
      if (error) {
        showToast('Failed to update duration', true);
        info.revert();
      } else {
        showToast('Duration updated');
      }
    },
    
    // Click on event
    eventClick: function(info) {
      openSchedEditModal(info.event.id);
    },
    
    // External drop (from unscheduled panel)
    drop: async function(info) {
      const schedId = info.draggedEl.dataset.schedId;
      const newDate = info.date.toISOString().split('T')[0];
      const newTime = info.date.toTimeString().slice(0,5);
      
      const { error } = await sb.from('cleaning_schedule').update({
        planned_date: newDate,
        planned_time: newTime,
        status: 'scheduled'
      }).eq('id', schedId);
      
      if (error) {
        showToast('Failed to schedule', true);
      } else {
        showToast('Cleaning scheduled');
        info.draggedEl.remove();
        loadCalendar();
      }
    }
  });
  
  calendar.render();
  
  // Make unscheduled items draggable
  makeUnscheduledDraggable();
}

function getCalendarEvents() {
  return calendarData.scheduled.map(s => {
    const prop = s.prop || {};
    const area = prop.area || '';
    const color = AREA_COLORS[area] || '#999';
    const duration = s.duration_hours || 2;
    
    let startTime = s.planned_time || '09:00';
    if (startTime.length === 5) startTime += ':00';
    
    return {
      id: s.id,
      title: `${prop.address || 'Unknown'} (${prop.suburb || ''})`,
      start: `${s.planned_date}T${startTime}`,
      end: calculateEndTime(s.planned_date, startTime, duration),
      backgroundColor: color,
      borderColor: color,
      textColor: ['NE_OUTER', 'NORTH_INNER'].includes(area) ? '#333' : '#fff',
      extendedProps: {
        area: area,
        suburb: prop.suburb,
        beds: prop.bedrooms,
        baths: prop.bathrooms,
        status: s.status
      }
    };
  });
}

function calculateEndTime(date, startTime, durationHours) {
  const start = new Date(`${date}T${startTime}`);
  start.setMinutes(start.getMinutes() + (durationHours * 60));
  return start.toISOString();
}

function refreshCalendarEvents() {
  calendar.removeAllEvents();
  calendar.addEventSource(getCalendarEvents());
}

function renderUnscheduledPanel() {
  const list = document.getElementById('unscheduledList');
  const count = document.getElementById('unschedCount');
  
  count.textContent = calendarData.unscheduled.length;
  
  if (!calendarData.unscheduled.length) {
    list.innerHTML = '<div class="empty-state" style="padding:20px;font-size:12px;">All cleanings scheduled! 🎉</div>';
    return;
  }
  
  list.innerHTML = calendarData.unscheduled.map(s => {
    const prop = s.prop || {};
    const area = prop.area || '';
    const color = AREA_COLORS[area] || '#ccc';
    
    return `<div class="unscheduled-item" data-sched-id="${s.id}" style="border-left-color:${color};">
      <div class="item-address">${prop.address || 'Unknown'}</div>
      <div class="item-meta">${prop.suburb || ''} • ${prop.bedrooms || '?'}bd/${prop.bathrooms || '?'}ba</div>
      ${area ? `<span class="item-area" style="background:${color};color:${['NE_OUTER','NORTH_INNER'].includes(area)?'#333':'#fff'};">${getAreaName(area)}</span>` : ''}
    </div>`;
  }).join('');
  
  makeUnscheduledDraggable();
}

function makeUnscheduledDraggable() {
  document.querySelectorAll('.unscheduled-item').forEach(el => {
    new FullCalendar.Draggable(el, {
      eventData: function(eventEl) {
        const schedId = eventEl.dataset.schedId;
        const sched = calendarData.unscheduled.find(s => s.id === schedId);
        const prop = sched?.prop || {};
        const area = prop.area || '';
        const color = AREA_COLORS[area] || '#999';
        
        return {
          id: schedId,
          title: `${prop.address || 'Unknown'}`,
          duration: { hours: sched?.duration_hours || 2 },
          backgroundColor: color,
          borderColor: color,
          create: false
        };
      }
    });
  });
}

// Selected workers for multi-assignment
let selectedWorkerIds = [];
let currentSchedData = null;
let workerScheduleCache = {};

async function openSchedEditModal(schedId) {
  const sched = allSchedules.find(s => s.id === schedId);
  if (!sched) return;
  
  currentSchedData = sched;
  
  // Load assigned_workers from JSONB array, fallback to assigned_worker_id
  if (sched.assigned_workers && Array.isArray(sched.assigned_workers) && sched.assigned_workers.length > 0) {
    selectedWorkerIds = [...sched.assigned_workers];
  } else if (sched.assigned_worker_id) {
    selectedWorkerIds = [sched.assigned_worker_id];
  } else {
    selectedWorkerIds = [];
  }
  
  // Reset UI
  document.getElementById('schedEditId').value = schedId;
  document.getElementById('schedEditAlert').className = 'modal-alert';
  document.getElementById('schedEditAlert').textContent = '';
  document.getElementById('schedEditConflictAlert').style.display = 'none';
  
  // Property Info
  const prop = sched.prop || {};
  document.getElementById('schedEditAddress').textContent = `${prop.address || 'Unknown'}, ${prop.suburb || ''}`;
  
  const areaBadge = document.getElementById('schedEditAreaBadge');
  if (prop.area) {
    areaBadge.textContent = getAreaName(prop.area);
    areaBadge.className = `area-badge area-${prop.area}`;
  } else {
    areaBadge.textContent = 'No Area';
    areaBadge.className = 'area-badge area-unknown';
  }
  
  document.getElementById('schedEditBedBath').textContent = `${prop.bedrooms || '?'} bed / ${prop.bathrooms || '?'} bath`;
  
  // Customer Preferences - need to fetch from properties
  try {
    const { data: propData } = await sb.from('properties')
      .select('pref_day, pref_time, pref_presence, cleaning_notes')
      .eq('id', sched.property_id).single();
    
    if (propData) {
      document.getElementById('schedEditPrefDay').textContent = propData.pref_day || 'Any';
      document.getElementById('schedEditPrefTime').textContent = propData.pref_time ? propData.pref_time.replace('_', ' ') : 'Any';
      document.getElementById('schedEditPrefPresence').textContent = propData.pref_presence || 'Not specified';
      
      const notesEl = document.getElementById('schedEditCleaningNotes');
      if (propData.cleaning_notes) {
        notesEl.innerHTML = `<strong>Notes:</strong> ${propData.cleaning_notes}`;
        notesEl.style.display = 'block';
      } else {
        notesEl.style.display = 'none';
      }
    }
  } catch(e) { console.warn('Could not load preferences:', e); }
  
  // Schedule
  document.getElementById('schedEditDate').value = sched.planned_date || '';
  document.getElementById('schedEditTime').value = sched.planned_time || '';
  buildTimeGrid(sched.planned_time || '', 'schedTimeGrid', 'schedEditTime');
  document.getElementById('schedEditDuration').value = sched.duration_hours || 2;
  document.getElementById('schedEditStatus').value = sched.status || 'requested';

  // Photos & Notes
  const beforePhotos = Array.isArray(sched.before_photos) ? sched.before_photos.filter(Boolean) : [];
  const afterPhotos = Array.isArray(sched.after_photos) ? sched.after_photos.filter(Boolean) : [];
  const hasPhotos = beforePhotos.length > 0 || afterPhotos.length > 0;

  const photoSection = document.getElementById('schedPhotosSection');
  const photoContent = document.getElementById('schedPhotosContent');
  if (hasPhotos) {
    let html = '';
    if (beforePhotos.length) {
      html += '<div class="admin-photo-label">Before (' + beforePhotos.length + ')</div>';
      html += '<div class="admin-photo-row">' + beforePhotos.map((url, i) =>
        '<img class="admin-photo-thumb" src="' + url + '" onclick="event.stopPropagation();openAdminLb(this,' + i + ')">'
      ).join('') + '</div>';
    }
    if (afterPhotos.length) {
      html += '<div class="admin-photo-label">After (' + afterPhotos.length + ')</div>';
      html += '<div class="admin-photo-row">' + afterPhotos.map((url, i) =>
        '<img class="admin-photo-thumb" src="' + url + '" onclick="event.stopPropagation();openAdminLb(this,' + i + ')">'
      ).join('') + '</div>';
    }
    photoContent.innerHTML = html;
    photoSection.style.display = '';
  } else {
    photoSection.style.display = 'none';
  }

  const notesSection = document.getElementById('schedNotesSection');
  const notesContent = document.getElementById('schedNotesContent');
  if (sched.worker_notes) {
    notesContent.textContent = sched.worker_notes;
    notesSection.style.display = '';
  } else {
    notesSection.style.display = 'none';
  }

  // Load workers with distance sorting
  await loadWorkerSchedulesForDate(sched.planned_date);
  renderWorkerCheckboxList(prop.area);
  updateChCalculation();

  // Show reset section only if subscription linked
  document.getElementById('schedResetSection').style.display = sched.subscription_id ? 'block' : 'none';

  // Show reschedule banner if pending
  const banner = document.getElementById('schedRescheduleBanner');
  if (sched.reschedule_requested && sched.reschedule_proposed_date) {
    const d = new Date(sched.reschedule_proposed_date + 'T00:00:00');
    document.getElementById('schedRescheduleProposedDate').textContent =
      d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    const noteWrap = document.getElementById('schedRescheduleNoteWrap');
    if (sched.reschedule_note) {
      document.getElementById('schedRescheduleNote').textContent = sched.reschedule_note;
      noteWrap.style.display = '';
    } else {
      noteWrap.style.display = 'none';
    }
    banner.style.display = '';
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('schedEditModal').classList.add('open');
}

async function loadWorkerSchedulesForDate(date) {
  if (!date) { workerScheduleCache = {}; return; }
  
  try {
    const { data } = await sb.from('cleaning_schedule')
      .select('id, assigned_worker_id, assigned_workers, planned_date, planned_time, duration_hours, properties(address)')
      .eq('planned_date', date)
      .in('status', ['scheduled', 'confirmed', 'in_progress']);
    
    workerScheduleCache = {};
    (data || []).forEach(s => {
      // Check assigned_workers JSONB array first, fallback to assigned_worker_id
      const workerIds = (s.assigned_workers && Array.isArray(s.assigned_workers) && s.assigned_workers.length > 0)
        ? s.assigned_workers
        : (s.assigned_worker_id ? [s.assigned_worker_id] : []);
      
      workerIds.forEach(wid => {
        if (!workerScheduleCache[wid]) workerScheduleCache[wid] = [];
        workerScheduleCache[wid].push(s);
      });
    });
  } catch(e) {
    console.warn('Could not load worker schedules:', e);
    workerScheduleCache = {};
  }
}

function renderWorkerCheckboxList(propertyArea) {
  const container = document.getElementById('schedEditWorkerList');
  
  if (!allWorkers.length) {
    container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-light);">No workers available. Add workers first.</div>';
    return;
  }
  
  // Sort workers by distance to property area
  const sortedWorkers = [...allWorkers].sort((a, b) => {
    const distA = getAreaDistance(a.area, propertyArea);
    const distB = getAreaDistance(b.area, propertyArea);
    return distA - distB;
  });
  
  container.innerHTML = sortedWorkers.map(w => {
    const isSelected = selectedWorkerIds.includes(w.id);
    const distance = getAreaDistance(w.area, propertyArea);
    const distanceText = distance === 0 ? 'Same area' : `~${distance} min`;
    const conflict = checkWorkerConflictStatus(w.id);
    
    let statusClass = 'available';
    let statusText = '✓ Available';
    if (conflict.type === 'overlap') {
      statusClass = 'conflict';
      statusText = '✕ Conflict';
    } else if (conflict.type === 'tight') {
      statusClass = 'warning';
      statusText = '⚠ Tight';
    }
    
    const itemClass = isSelected ? (conflict.type === 'overlap' ? 'selected conflict' : conflict.type === 'tight' ? 'selected warning' : 'selected') : '';
    
    return `<label class="worker-checkbox-item ${itemClass}" data-worker-id="${w.id}">
      <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleWorkerSelection('${w.id}')">
      <div class="worker-info">
        <div class="worker-name">${w.full_name || w.name || '?'}</div>
        <div class="worker-meta">${w.area ? getAreaName(w.area) : 'No area'}</div>
      </div>
      <div class="worker-distance">${distanceText}</div>
      <div class="worker-status ${statusClass}">${statusText}</div>
    </label>`;
  }).join('');
}

function toggleWorkerSelection(workerId) {
  const idx = selectedWorkerIds.indexOf(workerId);
  if (idx >= 0) {
    selectedWorkerIds.splice(idx, 1);
  } else {
    selectedWorkerIds.push(workerId);
  }
  
  // Update UI
  const prop = currentSchedData?.prop || {};
  renderWorkerCheckboxList(prop.area);
  updateChCalculation();
  checkWorkerConflicts();
  
  // Auto-update status to scheduled if workers assigned
  if (selectedWorkerIds.length > 0) {
    const statusEl = document.getElementById('schedEditStatus');
    if (statusEl.value === 'requested') {
      statusEl.value = 'scheduled';
    }
  }
}

function getAreaDistance(workerArea, propertyArea) {
  if (!workerArea || !propertyArea) return 30;
  if (workerArea === propertyArea) return 0;
  
  // Simplified distance matrix (minutes)
  const distances = {
    'SE_INNER': { 'EAST': 8, 'INNER_SOUTH': 8, 'SE_MID': 8, 'CBD': 12, 'SE_OUTER': 12, 'MELVILLE': 15, 'NE_INNER': 15, 'ARMADALE': 20 },
    'EAST': { 'SE_INNER': 8, 'SE_MID': 10, 'CBD': 15, 'NE_INNER': 12 },
    'NE_INNER': { 'NE_MID': 8, 'CBD': 12, 'EAST': 12, 'SE_INNER': 15, 'NE_OUTER': 15 },
    'NE_MID': { 'NE_INNER': 8, 'NE_OUTER': 10 },
    'CBD': { 'INNER_SOUTH': 8, 'SE_INNER': 12, 'WEST': 15, 'NE_INNER': 12 },
    'WEST': { 'CBD': 15, 'FREMANTLE': 12, 'MELVILLE': 12 },
    'FREMANTLE': { 'WEST': 12, 'MELVILLE': 10, 'COCKBURN': 15 },
    'MELVILLE': { 'SE_INNER': 15, 'FREMANTLE': 10, 'COCKBURN': 12 },
    'COCKBURN': { 'MELVILLE': 12, 'FREMANTLE': 15, 'ROCKINGHAM': 20 },
    'ROCKINGHAM': { 'COCKBURN': 20 }
  };
  
  return distances[workerArea]?.[propertyArea] || distances[propertyArea]?.[workerArea] || 25;
}

function checkWorkerConflictStatus(workerId) {
  const schedId = document.getElementById('schedEditId').value;
  const date = document.getElementById('schedEditDate').value;
  const time = document.getElementById('schedEditTime').value;
  const duration = parseFloat(document.getElementById('schedEditDuration').value) || 2;
  
  if (!date || !time) return { type: null };
  
  const workerScheds = (workerScheduleCache[workerId] || []).filter(s => s.id !== schedId);
  if (!workerScheds.length) return { type: null };
  
  const newStart = timeToMinutes(time);
  const newEnd = newStart + (duration * 60);
  
  for (const s of workerScheds) {
    if (!s.planned_time) continue;
    const existStart = timeToMinutes(s.planned_time);
    const existEnd = existStart + ((s.duration_hours || 2) * 60);
    
    // Calculate gap (negative = overlap, positive = gap between cleanings)
    let gap = null;
    if (newEnd <= existStart) {
      // New cleaning ends before existing starts
      gap = existStart - newEnd;
    } else if (newStart >= existEnd) {
      // New cleaning starts after existing ends
      gap = newStart - existEnd;
    } else {
      // Overlapping - calculate how much they overlap (as negative gap)
      gap = Math.max(newStart - existEnd, existStart - newEnd);
    }
    
    // Overlap or gap < 10 min → 🔴 Conflict (cannot save)
    if (gap !== null && gap < 10) {
      return { type: 'overlap', sched: s, gap };
    }
    
    // Gap 10-19 min → 🟠 Tight (warning, can save)
    if (gap !== null && gap < 20) {
      return { type: 'tight', sched: s, gap };
    }
  }
  
  return { type: null };
}

function timeToMinutes(timeStr) {
  if (!timeStr) return 0;
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + (m || 0);
}

function minutesToTime(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
}

function buildTimeGrid(selectedTime, gridId, inputId) {
  gridId = gridId || 'schedTimeGrid';
  inputId = inputId || 'schedEditTime';
  const grid = document.getElementById(gridId);
  const slots = [];
  for (let h = 7; h <= 17; h++) {
    slots.push(`${h.toString().padStart(2,'0')}:00`);
    if (h < 17) slots.push(`${h.toString().padStart(2,'0')}:30`);
  }
  const selShort = (selectedTime || '').substring(0,5);
  const isCustom = selectedTime && !slots.includes(selShort);
  let html = slots.map(t => {
    const sel = t === selShort ? ' selected' : '';
    const hr = parseInt(t); const mn = t.substring(3);
    const label = hr > 12 ? `${hr-12}:${mn}pm` : (hr === 12 ? `12:${mn}pm` : `${hr}:${mn}am`);
    return `<button type="button" class="time-btn${sel}" onclick="pickTime('${t}','${gridId}','${inputId}',this)">${label}</button>`;
  }).join('');
  /* Custom time input */
  html += `<input type="time" class="time-btn${isCustom ? ' selected' : ''}" value="${isCustom ? selShort : ''}" placeholder="Other" style="font-size:11px;text-align:center;" onchange="pickCustomTime(this,'${gridId}','${inputId}')">`;
  grid.innerHTML = html;
}
function pickTime(val, gridId, inputId, btn) {
  document.getElementById(inputId).value = val;
  document.querySelectorAll('#' + gridId + ' .time-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  if (gridId === 'schedTimeGrid') checkWorkerConflicts();
}
function pickCustomTime(input, gridId, inputId) {
  if (!input.value) return;
  document.getElementById(inputId).value = input.value;
  document.querySelectorAll('#' + gridId + ' .time-btn').forEach(b => b.classList.remove('selected'));
  input.classList.add('selected');
  if (gridId === 'schedTimeGrid') checkWorkerConflicts();
}

function checkWorkerConflicts() {
  const alertEl = document.getElementById('schedEditConflictAlert');
  const btn = document.getElementById('btnSaveSched');
  
  let hasConflict = false;
  let hasWarning = false;
  let messages = [];
  
  for (const wid of selectedWorkerIds) {
    const worker = allWorkers.find(w => w.id === wid);
    const conflict = checkWorkerConflictStatus(wid);
    
    if (conflict.type === 'overlap') {
      hasConflict = true;
      messages.push(`🔴 ${worker?.full_name || 'Worker'} is already assigned to "${conflict.sched.properties?.address || 'another cleaning'}" at this time.`);
    } else if (conflict.type === 'tight') {
      hasWarning = true;
      messages.push(`🟠 ${worker?.full_name || 'Worker'} has another cleaning with only ${conflict.gap} min gap.`);
    }
  }
  
  if (hasConflict) {
    alertEl.innerHTML = `<div class="conflict-alert error"><span class="conflict-alert-icon">⛔</span><div>${messages.join('<br>')}<br><strong>Cannot save with conflicts.</strong></div></div>`;
    alertEl.style.display = 'block';
    btn.disabled = true;
  } else if (hasWarning) {
    alertEl.innerHTML = `<div class="conflict-alert warning"><span class="conflict-alert-icon">⚠️</span><div>${messages.join('<br>')}</div></div>`;
    alertEl.style.display = 'block';
    btn.disabled = false;
  } else {
    alertEl.style.display = 'none';
    btn.disabled = false;
  }
  
  // Re-render to update status badges
  const prop = currentSchedData?.prop || {};
  renderWorkerCheckboxList(prop.area);
}

function updateChCalculation() {
  const workerCount = selectedWorkerIds.length;
  const duration = parseFloat(document.getElementById('schedEditDuration').value) || 2;
  const time = document.getElementById('schedEditTime').value;
  
  document.getElementById('schedEditWorkerCount').textContent = workerCount;
  document.getElementById('schedEditDurationDisplay').textContent = `${duration} hrs`;
  
  // End time
  if (time) {
    const startMins = timeToMinutes(time);
    const endMins = startMins + (duration * 60);
    document.getElementById('schedEditEndTime').textContent = minutesToTime(endMins);
  } else {
    document.getElementById('schedEditEndTime').textContent = '—';
  }
  
  // CH calculation: workers × duration
  const ch = workerCount * duration;
  document.getElementById('schedEditChDeduct').textContent = `${ch} hrs`;
}

function closeSchedEditModal() {
  document.getElementById('schedEditModal').classList.remove('open');
  currentSchedData = null;
  selectedWorkerIds = [];
}

// ── Reschedule Approval ──────────────────────────────────
async function approveReschedule(type) {
  const isCleaning = type === 'cleaning';
  const id = isCleaning
    ? document.getElementById('schedEditId').value
    : document.getElementById('jobEditId').value;
  const job = isCleaning ? currentSchedData : allJobRequests.find(j => j.id === id);
  if (!job) return;

  const proposedDate = job.reschedule_proposed_date;
  if (!proposedDate) return;

  const btn = isCleaning
    ? document.querySelector('#schedRescheduleBanner .modal-btn-primary')
    : document.querySelector('#jobRescheduleBanner .modal-btn-primary');
  btn.disabled = true;
  btn.textContent = 'Approving…';

  try {
    const table = isCleaning ? 'cleaning_schedule' : 'service_requests';
    const dateField = isCleaning ? 'planned_date' : 'scheduled_date';

    const { error } = await sb.from(table).update({
      [dateField]: proposedDate,
      reschedule_requested: false,
      reschedule_proposed_date: null,
      reschedule_approved_by: (await sb.auth.getUser()).data.user?.id || null,
    }).eq('id', id);
    if (error) throw error;

    // Send confirmation email to customer
    const prop = isCleaning ? (currentSchedData?.prop || {}) : (job.properties || {});
    const addr = [prop.address, prop.suburb].filter(Boolean).join(', ') || '';
    const customerId = job.user_id;
    const refType = isCleaning ? 'cleaning' : 'service';
    const d = new Date(proposedDate + 'T00:00:00');
    const dateFormatted = d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    if (customerId) {
      fetch(SUPABASE_URL + '/functions/v1/send-notification', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON },
        body: JSON.stringify({
          type: 'reschedule_confirmed',
          recipients: [{ id: customerId, type: 'customer' }],
          reference_id: id,
          reference_type: refType,
          details: {
            address: addr,
            date: dateFormatted,
            original_date: isCleaning ? job.planned_date : job.scheduled_date,
          },
        }),
      }).catch(e => console.warn('Customer notification failed:', e));
    }

    showToast('Reschedule approved — customer will be notified');
    if (isCleaning) { closeSchedEditModal(); loadSchedules(); }
    else { closeJobEditModal(); loadJobRequests(); }

  } catch(e) {
    showToast('Error: ' + (e.message || 'Failed to approve'), 'error');
    btn.disabled = false;
    btn.textContent = '✓ Approve & Update Date';
  }
}

async function rejectReschedule(type) {
  const isCleaning = type === 'cleaning';
  const id = isCleaning
    ? document.getElementById('schedEditId').value
    : document.getElementById('jobEditId').value;

  const table = isCleaning ? 'cleaning_schedule' : 'service_requests';
  const { error } = await sb.from(table).update({
    reschedule_requested: false,
    reschedule_proposed_date: null,
    reschedule_note: null,
  }).eq('id', id);

  if (!error) {
    showToast('Reschedule request rejected');
    if (isCleaning) { closeSchedEditModal(); loadSchedules(); }
    else { closeJobEditModal(); loadJobRequests(); }
  }
}

async function resetScheduleFromCleaning() {
  if (!currentSchedData) return;
  const subId = currentSchedData.subscription_id;
  if (!subId) { showToast('No subscription linked to this cleaning.', true); return; }
  if (!confirm('Reset cleaning schedule?\n\nThis will:\n• Clear the cleaning start month\n• Delete all future visits (requested/scheduled/confirmed)\n• Customer will need to re-select from dashboard')) return;

  try {
    const { error } = await sb.from('subscriptions')
      .update({ cleaning_start_month: null, preferred_week: null, confirmed_date: null })
      .eq('id', subId);
    if (error) throw error;

    await sb.from('cleaning_schedule')
      .delete()
      .eq('subscription_id', subId)
      .in('status', ['requested', 'scheduled', 'confirmed']);

    showToast('Cleaning schedule reset. Customer can re-select start month.');
    closeSchedEditModal();
    loadSchedules();
    if (typeof loadCalendar === 'function') loadCalendar();
  } catch(e) {
    showToast('Failed to reset: ' + e.message, true);
    console.error(e);
  }
}

async function saveSchedEdit() {
  const id = document.getElementById('schedEditId').value;
  const status = document.getElementById('schedEditStatus').value;
  const date = document.getElementById('schedEditDate').value;
  const time = document.getElementById('schedEditTime').value;
  const duration = parseFloat(document.getElementById('schedEditDuration').value) || 2;
  const alertEl = document.getElementById('schedEditAlert');
  
  // Check for conflicts before saving
  for (const wid of selectedWorkerIds) {
    const conflict = checkWorkerConflictStatus(wid);
    if (conflict.type === 'overlap') {
      alertEl.textContent = 'Cannot save: Worker has conflicting schedule.';
      alertEl.className = 'modal-alert error';
      return;
    }
  }
  
  const btn = document.getElementById('btnSaveSched');
  btn.disabled = true; btn.textContent = 'Saving…';
  
  try {
    // Save all selected workers to assigned_workers JSONB array
    // Keep assigned_worker_id for backward compatibility (first worker)
    const workerId = selectedWorkerIds.length > 0 ? selectedWorkerIds[0] : null;
    const chDeducted = selectedWorkerIds.length * duration;
    
    const schedUpdatePayload = {
      status,
      planned_date: date || null,
      planned_time: time || null,
      assigned_worker_id: workerId,
      assigned_workers: selectedWorkerIds,
      duration_hours: duration,
      ch_deducted: chDeducted,
      updated_at: new Date().toISOString()
    };
    if (status === 'in_progress') {
      schedUpdatePayload.actual_start = currentSchedData?.actual_start || new Date().toISOString();
    } else if (['requested', 'scheduled', 'confirmed'].includes(status)) {
      schedUpdatePayload.actual_start = null;
    }
    const { error } = await sb.from('cleaning_schedule').update(schedUpdatePayload).eq('id', id);
    if (error) throw error;

    // ── Send notification when status is scheduled/confirmed ──
    if (status === 'scheduled' || status === 'confirmed') {
      const sched = currentSchedData;
      const prop = sched?.prop || {};
      const addr = [prop.address, prop.suburb].filter(Boolean).join(', ') || 'Property';
      const notifRecipients = [];
      if (sched?.user_id) {
        notifRecipients.push({ id: sched.user_id, type: 'customer' });
      }
      for (const wid of selectedWorkerIds) {
        notifRecipients.push({ id: wid, type: 'worker' });
      }
      fetch(SUPABASE_URL + '/functions/v1/send-notification', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON },
        body: JSON.stringify({
          type: 'scheduled',
          recipients: notifRecipients,
          reference_id: id,
          reference_type: 'cleaning',
          details: { address: addr, date: date || '', time: time || '' },
        }),
      }).catch(e => console.warn('Notification send failed:', e));
    }

    // ── Admin alert when new cleaning request arrives (status: requested) ──
    if (status === 'requested') {
      const sched = currentSchedData;
      const prop = sched?.prop || {};
      const addr = [prop.address, prop.suburb].filter(Boolean).join(', ') || '';
      fetch(SUPABASE_URL + '/functions/v1/send-notification', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON },
        body: JSON.stringify({
          type: 'new_request',
          notify_admins: true,
          reference_id: id,
          reference_type: 'cleaning',
          details: { address: addr, date: date || '', time: time || '' },
        }),
      }).catch(e => console.warn('Admin notification failed:', e));
    }

    showToast('Cleaning updated successfully');
    closeSchedEditModal();
    loadSchedules();
  } catch(e) {
    alertEl.textContent = e.message || 'Failed to save';
    alertEl.className = 'modal-alert error';
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

/* ══ Admin: Job Requests ════════════════════════════════════ */
let allJobRequests = [];

async function loadJobRequests() {
  if (!isAdmin) return;
  const body = document.getElementById('jobsBody');
  const status = document.getElementById('jobStatusFilter').value;
  body.innerHTML = '<tr><td colspan="7" class="empty-state">Loading…</td></tr>';

  // Load workers for dropdown if not already loaded
  if (!allWorkers.length) await loadWorkersForDropdowns();

  let q = sb.from('service_requests')
    .select('*, properties(address, suburb)')
    .order('created_at', { ascending: false }).limit(100);
  if (status) q = q.eq('status', status);
  const { data } = await q;

  if (!data?.length) { body.innerHTML = '<tr><td colspan="9" class="empty-state">No job requests found.</td></tr>'; return; }

  // Get user info
  const userIds = [...new Set(data.map(r => r.user_id).filter(Boolean))];
  let profileMap = {};
  if (userIds.length) {
    const { data: profiles } = await sb.from('profiles').select('id, full_name').in('id', userIds);
    (profiles || []).forEach(p => profileMap[p.id] = p);
  }

  // Stats
  const pending = data.filter(j => j.status === 'requested').length;
  const confirmed = data.filter(j => j.status === 'confirmed').length;
  const inProgress = data.filter(j => j.status === 'in_progress').length;
  const completed = data.filter(j => j.status === 'completed').length;
  
  document.getElementById('statJobPending').textContent = pending;
  document.getElementById('statJobConfirmed').textContent = confirmed;
  document.getElementById('statJobInProgress').textContent = inProgress;
  document.getElementById('statJobCompleted').textContent = completed;

  allJobRequests = data.map(j => ({ ...j, profile: profileMap[j.user_id] || {} }));
  renderJobRequests(allJobRequests);
}

function renderJobRequests(list) {
  const body = document.getElementById('jobsBody');
  if (!list.length) { body.innerHTML = '<tr><td colspan="9" class="empty-state">No results.</td></tr>'; return; }
  
  const workerMap = {};
  allWorkers.forEach(w => workerMap[w.id] = w);

  body.innerHTML = list.map(j => {
    const d = new Date(j.created_at).toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    const customer = j.profile?.full_name || '—';
    const prop = j.properties || {};
    const addrLine = prop.address ? `${prop.address}${prop.suburb ? ', ' + prop.suburb : ''}` : '—';
    const category = (j.category || '—').replace(/_/g, ' ');
    const urgency = j.urgency === 'same_day' ? '⚡ Same Day' : j.urgency === 'after_hours' ? '🌙 After Hrs' : 'Standard';
    const estimate = j.sh_estimate ? `${j.sh_estimate}${j.sh_multiplier > 1 ? '×'+j.sh_multiplier : ''}` : '—';
    const actualSH = j.sh_used ? Math.round(j.sh_used * 10) / 10 + ' SH' : '—';
    const workerName = j.assigned_worker_id ? (workerMap[j.assigned_worker_id]?.full_name || '—') : '—';
    const badgeClass = j.status || 'requested';

    return `<tr>
      <td style="color:var(--text-light);">${d}</td>
      <td style="font-weight:600;">${customer}</td>
      <td style="font-size:12px;color:var(--text-light);">${addrLine}</td>
      <td style="text-transform:capitalize;">${category}</td>
      <td style="font-size:12px;">${urgency}</td>
      <td>${estimate} SH</td>
      <td style="font-weight:600;">${actualSH}</td>
      <td>${workerName}</td>
      <td><span class="badge badge-${badgeClass}">${j.status || 'requested'}</span></td>
      <td class="action-cell">
        <button class="btn-action-sm" onclick="openJobEditModal('${j.id}')">Edit</button>
      </td>
    </tr>`;
  }).join('');
}

function filterJobRequests() {
  const q = document.getElementById('jobSearch').value.toLowerCase();
  const filtered = allJobRequests.filter(j => {
    const name = (j.profile?.full_name || '').toLowerCase();
    const desc = (j.description || '').toLowerCase();
    return !q || name.includes(q) || desc.includes(q);
  });
  renderJobRequests(filtered);
}

async function openJobEditModal(jobId) {
  const job = allJobRequests.find(j => j.id === jobId);
  if (!job) return;
  
  // Ensure workers are loaded for dropdown
  if (!allWorkers.length) await loadWorkersForDropdowns();
  
  document.getElementById('jobEditId').value = jobId;
  document.getElementById('jobEditStatus').value = job.status || 'requested';
  document.getElementById('jobEditDate').value = job.scheduled_date || job.preferred_date || '';
  document.getElementById('jobEditTime').value = job.scheduled_time || '';

  document.getElementById('jobEditWorker').value = job.assigned_worker_id || '';
  document.getElementById('jobEditEstimate').value = job.sh_estimate || 1;
  document.getElementById('jobEditActual').value = job.sh_used || '';
  document.getElementById('jobEditNotes').value = job.admin_notes || '';
  document.getElementById('jobEditAlert').className = 'modal-alert';
  document.getElementById('jobEditAlert').textContent = '';

  // Show customer request photos if any
  const photos = Array.isArray(job.request_photos) ? job.request_photos.filter(Boolean) : [];
  const photoSection = document.getElementById('jobEditPhotosSection');

  }

function closeJobEditModal() {
