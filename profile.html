}

async function saveJobEdit() {
  const id = document.getElementById('jobEditId').value;
  let status = document.getElementById('jobEditStatus').value;
  const date = document.getElementById('jobEditDate').value;
  const time = document.getElementById('jobEditTime').value;
  const worker = document.getElementById('jobEditWorker').value;
  const estimate = parseFloat(document.getElementById('jobEditEstimate').value) || 1;
  const actual = parseFloat(document.getElementById('jobEditActual').value) || null;
  const notes = document.getElementById('jobEditNotes').value.trim();
  const alertEl = document.getElementById('jobEditAlert');

  /* Auto-upgrade status when worker + date assigned */
  if (worker && date && (status === 'requested' || status === 'confirmed')) {
    status = 'scheduled';
  } else if (worker && !date && status === 'requested') {
    status = 'confirmed';
  }

  const btn = document.getElementById('btnSaveJob');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    // 어드민이 in_progress로 강제 설정 시 actual_start 자동 세팅
    const existingJob = allJobRequests?.find(j => j.id === id);
    const actualStart = status === 'in_progress'
      ? (existingJob?.actual_start || new Date().toISOString())
      : (status === 'requested' || status === 'scheduled' || status === 'confirmed' ? null : undefined);

    const updatePayload = {
      status,
      scheduled_date: date || null,
      scheduled_time: time || null,
      assigned_worker_id: worker || null,
      sh_estimate: estimate,
      sh_used: actual,
      admin_notes: notes || null,
      updated_at: new Date().toISOString()
    };
    if (actualStart !== undefined) updatePayload.actual_start = actualStart;

    const { error } = await sb.from('service_requests').update(updatePayload).eq('id', id);
    
    if (error) throw error;

    // ── Admin alert when job request is updated to requested/confirmed ──
    if (status === 'requested' || status === 'confirmed') {
      const jobData = allJobRequests?.find(j => j.id === id);
      const prop = jobData?.property || {};
      const addr = [prop.address, prop.suburb].filter(Boolean).join(', ') || '';
      fetch(SUPABASE_URL + '/functions/v1/send-notification', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON },
        body: JSON.stringify({
          type: 'new_request',
          notify_admins: true,
          reference_id: id,
          reference_type: 'service',
          details: {
            address: addr,
            date: date || '',
            time: time || '',
            category: jobData?.category || '',
          },
        }),
      }).catch(e => console.warn('Admin notification failed:', e));
    }

    showToast('Job request updated successfully');
    closeJobEditModal();
    loadJobRequests();
  } catch(e) {
    alertEl.textContent = e.message || 'Failed to save';
    alertEl.className = 'modal-alert error';
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

  document.getElementById('workerNotes').value = worker?.notes || '';
  document.getElementById('workerAlert').className = 'modal-alert';
  document.getElementById('workerAlert').textContent = '';
  
  // Set area from existing data or match from address

  updateWorkerAreaBadge(worker?.area);

let workerPlacesAC = null;
function initWorkerPlaces() {
  const input = document.getElementById('workerAddress');
  if (!input || !window.google?.maps?.places) return;
  if (workerPlacesAC) return; // already initialized
  workerPlacesAC = new google.maps.places.Autocomplete(input, {
    componentRestrictions: { country: 'au' },
    types: ['address'],
    fields: ['address_components', 'formatted_address'],
  });
  workerPlacesAC.addListener('place_changed', () => {
    const place = workerPlacesAC.getPlace();
    if (!place.address_components) return;
    input.value = place.formatted_address || '';
    /* Extract suburb from Places + use enhancedAreaMatch */
    let suburb = '';
    place.address_components.forEach(c => {
      if (c.types.includes('locality')) suburb = c.long_name;
    });
    const result = enhancedAreaMatch(suburb, input.value);
    document.getElementById('workerArea').value = result.area || '';
    document.getElementById('workerAreaDisplay').value = result.area ? getAreaName(result.area) : '';
    updateWorkerAreaBadge(result.area, result.confidence);
  });
}

function matchWorkerArea() {
  const address = document.getElementById('workerAddress').value.trim();
  if (!address) { updateWorkerAreaBadge(null); return; }

  const result = enhancedAreaMatch(null, address);
  document.getElementById('workerArea').value = result.area || '';
  document.getElementById('workerAreaDisplay').value = result.area ? getAreaName(result.area) : '';
  updateWorkerAreaBadge(result.area, result.confidence);
}

function updateWorkerAreaBadge(area, confidence = 'high') {
  const badge = document.getElementById('workerAreaBadge');
  if (!area) {
    badge.textContent = '';
    badge.style.background = '';
    return;
  }
  
  if (confidence === 'high') {
    badge.textContent = '✓ Matched';
    badge.style.background = '#dcfce7';
    badge.style.color = '#166534';
  } else if (confidence === 'medium') {
    badge.textContent = '~ Partial';
    badge.style.background = '#fef3c7';
    badge.style.color = '#92400e';
  } else {
    badge.textContent = '';
    badge.style.background = '';
  }
}

function closeWorkerModal() {
  document.getElementById('workerModal').classList.remove('open');
}

async function saveWorker() {
  const id = document.getElementById('workerEditId').value;
  const name = document.getElementById('workerName').value.trim();
  const phone = document.getElementById('workerPhone').value.trim();
  const email = document.getElementById('workerEmail').value.trim();
  const address = document.getElementById('workerAddress').value.trim();
  const area = document.getElementById('workerArea')?.value || null;
  const workerType = document.getElementById('workerType').value;
  const cleaningRate = parseFloat(document.getElementById('workerCleaningRate').value) || null;
  const techRate = parseFloat(document.getElementById('workerTechRate').value) || null;
  const status = document.getElementById('workerStatus').value;
  const notes = document.getElementById('workerNotes').value.trim();
  const alertEl = document.getElementById('workerAlert');
  
  if (!name) {
    alertEl.textContent = 'Name is required';
    alertEl.className = 'modal-alert error';
    return;
  }
  
  const btn = document.getElementById('btnSaveWorker');
  btn.disabled = true; btn.textContent = 'Saving…';
  
  try {
    const payload = {
      full_name: name,
      phone: phone || null,
      email: email || null,
      address: address || null,
      area: area,
      worker_type: workerType,
      cleaning_rate: cleaningRate,
      tech_rate: techRate,
      is_active: status === 'active',
      notes: notes || null,
      updated_at: new Date().toISOString()
    };
    
    let error;
    if (id) {
      ({ error } = await sb.from('workers').update(payload).eq('id', id));
    } else {
      // worker_code is auto-generated by DB trigger
      ({ error } = await sb.from('workers').insert(payload));
    }
    
    if (error) throw error;
    
    showToast(id ? 'Team member updated' : 'Team member added');
    closeWorkerModal();
    loadWorkers();
    allWorkers = []; // Reset to force reload in dropdowns
  } catch(e) {
    alertEl.textContent = e.message || 'Failed to save';
    alertEl.className = 'modal-alert error';
  } finally {
    btn.disabled = false; btn.textContent = 'Save';
  }
}

async function deleteWorker(workerId, workerName) {
  if (!confirm(`Remove worker "${workerName}"?\n\nThis will permanently delete this worker record.`)) return;
  
  try {
    const { error } = await sb.from('workers').delete().eq('id', workerId);
    if (error) throw error;
    
    showToast('Worker removed');
    loadWorkers();
    allWorkers = []; // Reset to force reload in dropdowns
  } catch(e) {
    showToast(e.message || 'Failed to remove worker', true);
  }
}

async function approveTask(approvalId, taskId) {
  const radios = document.querySelectorAll(`input[name="proposal_${approvalId}"]`);
  let selectedProposal = 1;
  radios.forEach(r => { if (r.checked) selectedProposal = parseInt(r.value); });
  try {
    await sb.from('admin_approvals').update({
      status: 'approved', decided_by: 'sunny',
      decided_at: new Date().toISOString(),
      payload: { selected_proposal: selectedProposal },
    }).eq('id', approvalId);
    await sb.from('admin_tasks').update({ selected_proposal: selectedProposal, status: 'approved' }).eq('id', taskId);
    const session = (await sb.auth.getSession()).data.session;
    fetch('https://rtkgnlcgepromqtoelre.supabase.co/functions/v1/ai-dev-agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token}` },
      body: JSON.stringify({ approval_id: approvalId }),
    });
    showToast('승인 완료 — Dev 에이전트가 실행 중입니다…');
    document.getElementById(`task-card-${approvalId}`)?.remove();
    if (!document.querySelector('[id^="task-card-"]')) loadAITasks();
  } catch(e) { showToast('승인 실패: ' + e.message, true); }
}

async function holdTask(approvalId, taskId) {
  const comment = prompt('보류 사유 또는 추가 검토 내용을 입력하세요 (선택사항):', '') ?? '';
  try {
    await sb.from('admin_approvals').update({
      status: 'modified', decided_by: 'sunny',
      decided_at: new Date().toISOString(),
      comment: comment || '검토 보류',
    }).eq('id', approvalId);
    await sb.from('admin_tasks').update({ status: 'proposed' }).eq('id', taskId);
    showToast('검토 보류 처리되었습니다.');
    document.getElementById(`task-card-${approvalId}`)?.remove();
    if (!document.querySelector('[id^="task-card-"]')) loadAITasks();
  } catch(e) { showToast('처리 실패: ' + e.message, true); }
}

async function rejectTask(approvalId, taskId) {
  try {
    await sb.from('admin_approvals').update({
      status: 'rejected', decided_by: 'sunny',
      decided_at: new Date().toISOString(),
    }).eq('id', approvalId);
    await sb.from('admin_tasks').update({ status: 'rejected' }).eq('id', taskId);
    showToast('거절되었습니다.');
    document.getElementById(`task-card-${approvalId}`)?.remove();
    if (!document.querySelector('[id^="task-card-"]')) loadAITasks();
  } catch(e) { showToast('거절 실패: ' + e.message, true); }
}

async function reinstateTask(approvalId, taskId) {
  try {
    // approval을 pending으로 되돌리고 comment 초기화
    await sb.from('admin_approvals').update({
      status: 'pending',
      decided_by: null,
      decided_at: null,
      comment: null,
    }).eq('id', approvalId);
    // task도 proposed로 되돌려서 검토 대기 탭에 표시
    await sb.from('admin_tasks').update({ status: 'proposed' }).eq('id', taskId);
    showToast('검토 대기로 이동했습니다.');
    // 히스토리 탭 새로고침
    loadAIHistory();
  } catch(e) { showToast('처리 실패: ' + e.message, true); }
}

async function rejectFromHistory(approvalId, taskId) {
  if (!confirm('이 태스크를 최종 거절하시겠습니까?')) return;
  try {
    await sb.from('admin_approvals').update({
      status: 'rejected', decided_by: 'sunny',
      decided_at: new Date().toISOString(),
      comment: '검토 후 최종 거절',
    }).eq('id', approvalId);
    await sb.from('admin_tasks').update({ status: 'rejected' }).eq('id', taskId);
    showToast('최종 거절되었습니다.');
    loadAIHistory();
  } catch(e) { showToast('처리 실패: ' + e.message, true); }
}

function toggleHistDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  const hint = document.getElementById(id + '-hint');
  if (hint) hint.textContent = isOpen ? '내용 보기 ›' : '닫기 ›';
}

/* ══ Admin: Dashboard ═══════════════════════════════════════ */
async function loadDashboard() {
  if (!isAdmin) return;
  
  try {
    // Parallel fetch all data needed
    const [
      jobsRes,
      subsRes,
      propsRes,
      cleaningsRes
    ] = await Promise.all([
      // Pending job requests
      sb.from('service_requests').select('id').eq('status', 'requested'),
      // All active/suspended subscriptions
      sb.from('subscriptions').select('id, status, plan_type, user_id, property_id, cleaning_hours_total, cleaning_hours_used').in('status', ['active', 'suspended']),
      // All properties
      sb.from('properties').select('id, address, suburb, user_id'),
      // Cleanings this month
      sb.from('cleaning_schedule').select('id, planned_date, planned_time, status, property_id, assigned_worker_id, assigned_workers, ch_deducted, duration_hours, actual_duration')
        .gte('planned_date', getMonthStart())
        .lte('planned_date', getMonthEnd())
    ]);
    
    const jobs = jobsRes.data || [];
    const subs = subsRes.data || [];
    const props = propsRes.data || [];
    const cleanings = cleaningsRes.data || [];
    
    if (subsRes.error) console.error('Subs error:', subsRes.error);
    if (jobsRes.error) console.error('Jobs error:', jobsRes.error);
    
    // 1. Pending Jobs (service requests + cleanings pending/requested)
    const pendingCleanings = cleanings.filter(c => c.status === 'requested' || c.status === 'pending').length;
    const pendingJobs = jobs.length + pendingCleanings;
    document.getElementById('ctaPendingJobs').textContent = pendingJobs;
    updateCtaCardState('cta-pending', pendingJobs);
    
    // 2. Payment Issues (suspended subscriptions)
    const paymentIssues = subs.filter(s => s.status === 'suspended').length;
    document.getElementById('ctaPaymentIssues').textContent = paymentIssues;
    updateCtaCardState('cta-payment', paymentIssues);
    
    // 3. No Plan Properties
    const propsWithPlan = new Set(subs.map(s => s.property_id).filter(Boolean));
    const noPlanProps = props.filter(p => !propsWithPlan.has(p.id)).length;
    document.getElementById('ctaNoPlanProps').textContent = noPlanProps;
    updateCtaCardState('cta-noplan', noPlanProps);
    
    // 4. CH Low Alert (remaining hours <= 2)
    const chLowSubs = subs.filter(s => {
      if (s.status !== 'active') return false;
      const remaining = (s.cleaning_hours_total || 0) - (s.cleaning_hours_used || 0);
      return remaining <= 2;
    }).length;
    document.getElementById('ctaChLow').textContent = chLowSubs;
    updateCtaCardState('cta-chlow', chLowSubs);
    
    // 5. Revenue this month (from payments table)
    const paymentsRes = await sb.from('payments')
      .select('amount, stripe_fee, net_amount')
      .eq('status', 'paid')
      .gte('paid_at', getMonthStart())
      .lte('paid_at', getMonthEnd() + 'T23:59:59');

    const payments = paymentsRes.data || [];
    const totalRevenue = payments.reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
    const totalFees = payments.reduce((sum, p) => sum + (parseFloat(p.stripe_fee) || 0), 0);
    const totalNet = payments.reduce((sum, p) => sum + (parseFloat(p.net_amount) || 0), 0);

    // DB에 달러 단위로 저장됨 (cents 아님)
    document.getElementById('ctaRevenueMonth').textContent = `$${totalRevenue.toFixed(2)}`;
    document.getElementById('ctaFeesMonth').textContent = `$${totalFees.toFixed(2)}`;
    document.getElementById('ctaNetMonth').textContent = `$${totalNet.toFixed(2)}`;
    
    // This Month Stats
    const completedCleanings = cleanings.filter(c => c.status === 'completed').length;
    const totalChUsed = cleanings.filter(c => c.status === 'completed').reduce((sum, c) => sum + (c.actual_duration || c.ch_deducted || c.duration_hours || 2), 0);
    
    document.getElementById('dashCleaningsMonth').textContent = cleanings.length;
    document.getElementById('dashActiveSubs').textContent = subs.filter(s => s.status === 'active').length;
    document.getElementById('dashChUsed').textContent = `${totalChUsed.toFixed(1)} hrs`;
    
    // Jobs completed this month (cleanings + service requests)
    const completedServices = await sb.from('service_requests').select('id')
      .eq('status', 'completed')
      .gte('scheduled_date', getMonthStart())
      .lte('scheduled_date', getMonthEnd());
    const totalCompleted = completedCleanings + (completedServices.data || []).length;
    document.getElementById('dashJobsMonth').textContent = totalCompleted;
    
    // Cleanings & Job Requests
    await loadDashboardJobs();
    
  } catch(e) {
    console.error('Dashboard load error:', e);
  }
}

function updateCtaCardState(cardClass, value) {
  const card = document.querySelector(`.cta-card.${cardClass}`);
  if (!card) return;
  
  if (value === 0) {
    card.classList.add('cta-ok');
  } else {
    card.classList.remove('cta-ok');
  }
}

function getMonthStart() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
}

function getMonthEnd() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().split('T')[0];
}

async function loadDashboardJobs() {
  const body = document.getElementById('dashUpcomingBody');
  const typeFilter = document.getElementById('dashJobTypeFilter')?.value || 'all';
  const periodFilter = document.getElementById('dashPeriodFilter')?.value || '7days';

  const today = new Date().toISOString().split('T')[0];
  const weekLater = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

  let allItems = [];

  // ── Cleanings ──
  if (typeFilter === 'all' || typeFilter === 'cleaning') {
    let q = sb.from('cleaning_schedule')
      .select('id, planned_date, planned_time, status, property_id, assigned_worker_id, assigned_workers')
      .in('status', ['requested', 'scheduled', 'confirmed', 'in_progress', 'completed'])
      .order('planned_date', { ascending: true });

    if (periodFilter === '7days') {
      q = q.gte('planned_date', today).lte('planned_date', weekLater);
    } else if (periodFilter === 'month') {
      q = q.gte('planned_date', getMonthStart()).lte('planned_date', getMonthEnd());
    }

    const { data } = await q.limit(50);
    (data || []).forEach(c => allItems.push({ ...c, _type: 'cleaning', _desc: null }));
  }

  // ── Job Requests (Service Requests) ──
  if (typeFilter === 'all' || typeFilter === 'service') {
    let q = sb.from('service_requests')
      .select('id, scheduled_date, scheduled_time, status, property_id, assigned_worker_id, assigned_workers, category, description')
      .in('status', ['requested', 'scheduled', 'confirmed', 'in_progress', 'completed'])
      .order('scheduled_date', { ascending: true });

    if (periodFilter === '7days') {
      q = q.gte('scheduled_date', today).lte('scheduled_date', weekLater);
    } else if (periodFilter === 'month') {
      q = q.gte('scheduled_date', getMonthStart()).lte('scheduled_date', getMonthEnd());
    }

    const { data } = await q.limit(50);
    (data || []).forEach(s => allItems.push({
      id: s.id,
      planned_date: s.scheduled_date,
      planned_time: s.scheduled_time,
      status: s.status,
      property_id: s.property_id,
      assigned_worker_id: s.assigned_worker_id,
      assigned_workers: s.assigned_workers,
      _type: 'service',
      _desc: s.category || s.description || 'Service'
    }));
  }

  // Sort by date ascending
  allItems.sort((a, b) => (a.planned_date || '9999').localeCompare(b.planned_date || '9999'));

  if (!allItems.length) {
    body.innerHTML = '<tr><td colspan="6" class="empty-state">No jobs found.</td></tr>';
    return;
  }

  // Get property and worker info
  const propIds = [...new Set(allItems.map(c => c.property_id).filter(Boolean))];
  let propMap = {};
  if (propIds.length) {
    const { data: props } = await sb.from('properties').select('id, address, suburb').in('id', propIds);
    (props || []).forEach(p => propMap[p.id] = p);
  }

  if (!allWorkers.length) await loadWorkersForDropdowns();
  const workerMap = {};
  allWorkers.forEach(w => workerMap[w.id] = w);

  body.innerHTML = allItems.map(c => {
    const d = c.planned_date ? new Date(c.planned_date).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' }) : '—';
    const prop = propMap[c.property_id];
    const propLabel = c._type === 'service' && c._desc
      ? c._desc
      : (prop ? `${prop.address}, ${prop.suburb}` : '—');

    const workerIds = (c.assigned_workers && Array.isArray(c.assigned_workers) && c.assigned_workers.length > 0)
      ? c.assigned_workers
      : (c.assigned_worker_id ? [c.assigned_worker_id] : []);

    let workerDisplay = 'Unassigned';
    if (workerIds.length === 1) {
      workerDisplay = workerMap[workerIds[0]]?.full_name || 'Unknown';
    } else if (workerIds.length > 1) {
      workerDisplay = `${workerMap[workerIds[0]]?.full_name || '?'} +${workerIds.length - 1}`;
    }

    const typeLabel = c._type === 'cleaning'
      ? '<span style="color:#1976d2;font-weight:600;font-size:11px;">🧹 Cleaning</span>'
      : '<span style="color:#e65100;font-weight:600;font-size:11px;">🔧 Service</span>';

    const badgeMap = { requested: 'pending', scheduled: 'scheduled', confirmed: 'scheduled', in_progress: 'active', completed: 'completed' };
    const badgeClass = badgeMap[c.status] || 'pending';

    return `<tr>
      <td style="font-weight:600;">${d}</td>
      <td>${c.planned_time || '—'}</td>
      <td>${typeLabel}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${propLabel}">${propLabel}</td>
      <td>${workerDisplay}</td>
      <td><span class="badge badge-${badgeClass}">${c.status}</span></td>
    </tr>`;
  }).join('');
}

/* ══ Admin: Properties ══════════════════════════════════════ */
let allPropertiesData = [];

async function loadProperties() {
  if (!isAdmin) return;
  const body = document.getElementById('propsBody');
  body.innerHTML = '<tr><td colspan="7" class="empty-state">Loading…</td></tr>';
  
  // Initialize area dropdowns
  initAreaDropdowns();

  const { data } = await sb.from('properties')
    .select('id, address, suburb, postcode, area, property_type, bedrooms, bathrooms, access_instructions, user_id')
    .order('created_at', { ascending: false }).limit(200);
    
  if (!data?.length) { body.innerHTML = '<tr><td colspan="7" class="empty-state">No properties found.</td></tr>'; return; }

  // Get owners and subscriptions
  const userIds = [...new Set(data.map(p => p.user_id).filter(Boolean))];
  let profileMap = {}, subMap = {};
  
  if (userIds.length) {
    const [profilesRes, subsRes] = await Promise.all([
      sb.from('profiles').select('id, full_name').in('id', userIds),
      sb.from('subscriptions').select('user_id, plan_type, property_id').eq('status', 'active')
    ]);
    (profilesRes.data || []).forEach(p => profileMap[p.id] = p);
    (subsRes.data || []).forEach(s => { if(s.property_id) subMap[s.property_id] = s; });
  }

  allPropertiesData = data.map(p => ({
    ...p,
    owner: profileMap[p.user_id]?.full_name || '—',
    plan: subMap[p.id]?.plan_type || null
  }));
  
  renderProperties(allPropertiesData);
}

function renderProperties(list) {

  body.innerHTML = list.map(p => {
    const areaCode = p.area || '';
    const areaName = p.area ? getAreaName(p.area) : 'Not set';
    const areaClass = p.area ? `area-cell area-bg-${p.area}` : 'area-cell area-bg-unknown';
    const suggestion = !p.area ? suggestAreaForSuburb(p.suburb) : null;
    const suggestionHint = suggestion?.area ? ` <span style="font-size:10px;color:#888;">(→ ${suggestion.name})</span>` : '';
    
    return `<tr>

function filterProperties() {
  const q = document.getElementById('propSearch').value.toLowerCase();
  const area = document.getElementById('propAreaFilter').value;
  const filtered = allPropertiesData.filter(p => {
    const addr = (p.address || '').toLowerCase();
    const suburb = (p.suburb || '').toLowerCase();
    const matchQ = !q || addr.includes(q) || suburb.includes(q);
    const matchArea = !area || p.area === area;
    return matchQ && matchArea;

function openPropAreaModal(propId) {
  const prop = allPropertiesData.find(p => p.id === propId);
  if (!prop) return;

  document.getElementById('propAreaEditId').value = propId;
  document.getElementById('propAreaAddress').value = prop.address || '';
  document.getElementById('propAreaSuburb').value = prop.suburb || '';
  document.getElementById('propEditPostcode').value = prop.postcode || '';
  document.getElementById('propEditType').value = (prop.property_type || 'house').toLowerCase();
  document.getElementById('propEditBedrooms').value = prop.bedrooms || '';
  document.getElementById('propEditBathrooms').value = prop.bathrooms || '';
  document.getElementById('propEditAccess').value = prop.access_instructions || '';
  document.getElementById('propAreaSelect').value = prop.area || '';
  document.getElementById('propAreaAlert').className = 'modal-alert';
  document.getElementById('propAreaAlert').textContent = '';

  // Show suggestion using enhanced matching
  const suggestion = enhancedAreaMatch(prop.suburb, prop.address);
  const suggEl = document.getElementById('propAreaSuggestion');
  if (suggestion.area) {
    document.getElementById('propAreaSelect').value = suggestion.area;
    if (suggestion.area !== prop.area) {
      suggEl.innerHTML = `💡 Suggested: <strong>${suggestion.name}</strong> (${suggestion.confidence} confidence)`;
    } else {
      suggEl.textContent = '✓ Current area matches suggestion';
      suggEl.style.color = '#27ae60';
    }
  } else {
    suggEl.textContent = '';
  }
  
  document.getElementById('propAreaModal').classList.add('open');
}

function closePropAreaModal() {
  document.getElementById('propAreaModal').classList.remove('open');
}

async function savePropArea() {
  const id = document.getElementById('propAreaEditId').value;
  const alertEl = document.getElementById('propAreaAlert');

  const payload = {
    address: document.getElementById('propAreaAddress').value.trim(),
    suburb: document.getElementById('propAreaSuburb').value.trim(),
    postcode: document.getElementById('propEditPostcode').value.trim(),
    property_type: document.getElementById('propEditType').value,
    bedrooms: parseInt(document.getElementById('propEditBedrooms').value) || null,
    bathrooms: parseInt(document.getElementById('propEditBathrooms').value) || null,
    access_instructions: document.getElementById('propEditAccess').value.trim() || null,
    area: document.getElementById('propAreaSelect').value || null
  };

  if (!payload.address || !payload.suburb) {
    alertEl.textContent = 'Address and suburb are required.';
    alertEl.className = 'modal-alert error';
    return;
  }

  const btn = document.getElementById('btnSavePropArea');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const { error } = await sb.from('properties').update(payload).eq('id', id);
    if (error) throw error;

    showToast('Property updated');
    closePropAreaModal();
    loadProperties();
  } catch(e) {
    alertEl.textContent = e.message || 'Failed to save';
    alertEl.className = 'modal-alert error';
  } finally {
    btn.disabled = false; btn.textContent = 'Save';
  }
}

async function autoAssignAllAreas() {
  if (!confirm('This will auto-assign areas to all properties without an area based on suburb. Continue?')) return;
  
  const propsToUpdate = allPropertiesData.filter(p => !p.area);
  if (!propsToUpdate.length) {
    showToast('All properties already have areas assigned');
    return;
  }
  
  let updated = 0, failed = 0;
  
  for (const prop of propsToUpdate) {
    const suggestion = suggestAreaForSuburb(prop.suburb);
    if (suggestion.area) {
      try {
        const { error } = await sb.from('properties').update({ area: suggestion.area }).eq('id', prop.id);
        if (!error) updated++;
        else failed++;
      } catch(e) {
        failed++;
      }
    }
  }
  
  showToast(`Auto-assigned ${updated} properties${failed ? `, ${failed} failed` : ''}`);
  loadProperties();
}

async function saveSubManage() {
  const editId = document.getElementById('subManageEditId').value;
  const userId = document.getElementById('subManageCustomer').value;
  const propertyId = document.getElementById('subManageProperty').value;
  const planType = document.getElementById('subManagePlan').value;
  const status = document.getElementById('subManageStatus').value;
  const startDate = document.getElementById('subManageStartDate').value;
  const endDate = document.getElementById('subManageEndDate').value;
  const cleaningTotal = parseFloat(document.getElementById('subManageCleaningTotal').value) || 0;
  const cleaningUsed = parseFloat(document.getElementById('subManageCleaningUsed').value) || 0;
  const shTotal = parseFloat(document.getElementById('subManageSHTotal').value) || 0;
  const shUsed = parseFloat(document.getElementById('subManageSHUsed').value) || 0;

  const alertEl = document.getElementById('subManageAlert');

  if (!userId || !propertyId) {
    alertEl.textContent = 'Please select both a customer and property';
    alertEl.classList.remove('success');
    alertEl.classList.add('error');
    alertEl.style.display = 'block';
    return;
  }

  /* ── No Plan = full reset for this property ── */
  if (!planType) {
    const existingSub = manageDataState.subscriptions.find(s => s.property_id === propertyId && s.status === 'active');
    if (!existingSub) {
      alertEl.textContent = 'This property has no active plan to reset.';
      alertEl.classList.remove('success'); alertEl.classList.add('error');
      alertEl.style.display = 'block';
      return;
    }
    if (!confirm('⚠ Remove plan and delete ALL related data for this property?\n\n• Subscription\n• Cleaning schedules\n• Service requests\n\nThis cannot be undone.')) return;

    try {
      await sb.from('cleaning_schedule').delete().eq('property_id', propertyId);
      await sb.from('service_requests').delete().eq('property_id', propertyId);
      await sb.from('subscriptions').delete().eq('id', existingSub.id);

      alertEl.textContent = 'Plan removed and all data reset.';
      alertEl.classList.remove('error'); alertEl.classList.add('success');
      alertEl.style.display = 'block';
      setTimeout(() => { closeSubManageModal(); loadManageData(); showToast('Property plan reset complete.'); }, 800);
    } catch(e) {
      alertEl.textContent = 'Error: ' + (e.message || 'Reset failed');
      alertEl.classList.remove('success'); alertEl.classList.add('error');
      alertEl.style.display = 'block';
    }
    return;
  }

  try {
    const payload = {
      user_id: userId,
      property_id: propertyId,
      plan_type: planType,
      status: status,
      start_date: startDate,
      end_date: endDate || null,
      cleaning_hours_total: cleaningTotal,
      cleaning_hours_used: cleaningUsed,
      sh_hours_total: shTotal,
      sh_hours_used: shUsed,
    };

    let result;
    if (editId) {
      result = await sb.from('subscriptions').update(payload).eq('id', editId);
    } else {
      result = await sb.from('subscriptions').insert([payload]);
    }

    if (result.error) throw result.error;

    alertEl.textContent = editId ? 'Subscription updated!' : 'Subscription created!';
    alertEl.classList.remove('error');
    alertEl.classList.add('success');
    alertEl.style.display = 'block';

    setTimeout(() => {
      closeSubManageModal();
      loadManageData();
      showToast(editId ? 'Subscription updated' : 'Subscription created');
    }, 800);
  } catch (err) {
    console.error('Error saving subscription:', err);
    alertEl.textContent = 'Error: ' + (err.message || 'Unknown error');
    alertEl.classList.remove('success');
    alertEl.classList.add('error');
    alertEl.style.display = 'block';
  }
}

async function saveSHManage() {

  const userId = document.getElementById('shManageCustomer').value;
  const purchasedTotal = parseFloat(document.getElementById('shManagePurchasedTotal').value) || 0;

  const grantedTotal = parseFloat(document.getElementById('shManageGrantedTotal').value) || 0;

    ? (document.getElementById('shManageGrantLabelCustom').value.trim() || 'Other')
    : grantLabelSel;

  const alertEl = document.getElementById('shManageAlert');

  if (!userId) {
    alertEl.textContent = 'Please select a customer';

    alertEl.classList.add('error');

  try {

      purchased_used: purchasedUsed,
      override_total: grantedTotal,
      override_used: grantedUsed,
      override_label: grantedTotal > 0 ? grantLabel : null,
    };

    let result;

      result = await sb.from('sh_balance').insert([payload]);

      closeSHManageModal();

    console.error('Error saving SH balance:', err);
    alertEl.textContent = 'Error: ' + (err.message || 'Unknown error');
    alertEl.classList.remove('success');
    alertEl.classList.add('error');
    alertEl.style.display = 'block';
  }
}

<script>

let adminLbImages = [], adminLbIndex = 0;
function openAdminLb(imgEl, idx) {
  const row = imgEl.closest('.admin-photo-row');
  adminLbImages = Array.from(row.querySelectorAll('img')).map(i => i.src);
  adminLbIndex = idx;
  updateAdminLb();
  document.getElementById('adminLightbox').classList.add('open');
}
function closeAdminLb() { document.getElementById('adminLightbox').classList.remove('open'); }
function navAdminLb(dir) {
  adminLbIndex = (adminLbIndex + dir + adminLbImages.length) % adminLbImages.length;
  updateAdminLb();
}
function updateAdminLb() {
  document.getElementById('adminLbImage').src = adminLbImages[adminLbIndex];
  document.getElementById('adminLbLabel').textContent = 'Photo ' + (adminLbIndex + 1) + ' of ' + adminLbImages.length;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('adminLightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeAdminLb();
  if (e.key === 'ArrowLeft') navAdminLb(-1);
  if (e.key === 'ArrowRight') navAdminLb(1);
});

/* ═══ Notifications ═══════════════════════════════════ */
let notifOpen = false;

function toggleNotifDropdown(e) {
  e.stopPropagation();
  notifOpen = !notifOpen;
  document.getElementById('notifDropdown').classList.toggle('open', notifOpen);
}

document.addEventListener('click', (e) => {
  if (notifOpen && !e.target.closest('.notif-bell')) {
    notifOpen = false;
    document.getElementById('notifDropdown').classList.remove('open');
  }
});

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function notifIcon(type) {
  if (type === 'cleaning_scheduled' || type === 'service_confirmed') return '<div class="notif-icon scheduled">📅</div>';
  if (type === 'cleaning_reminder'  || type === 'job_reminder')      return '<div class="notif-icon reminder">⏰</div>';
  if (type === 'cleaning_completed' || type === 'service_completed') return '<div class="notif-icon completed">✅</div>';
  if (type === 'payment_received')  return '<div class="notif-icon scheduled">💳</div>';
  if (type === 'payment_failed')    return '<div class="notif-icon reminder">⚠️</div>';
  return '<div class="notif-icon scheduled">🔔</div>';
}
function notifTypeBadge(type) {
  if (type?.startsWith('cleaning_')) return '<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#e8f5e9;color:#2e7d32;margin-right:4px;vertical-align:middle;">Cleaning</span>';
  if (type?.startsWith('service_') || type === 'job_assigned' || type === 'job_reminder') return '<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#e3f2fd;color:#1565c0;margin-right:4px;vertical-align:middle;">Service</span>';
  if (type?.startsWith('payment_')) return '<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#f3e5f5;color:#6a1b9a;margin-right:4px;vertical-align:middle;">Payment</span>';
  return '';
}

function renderNotifications(notifications) {
  const list = document.getElementById('notifList');
  if (!notifications.length) {
    list.innerHTML = '<div class="notif-empty">No notifications yet</div>';
    return;
  }
  const show = notifications.slice(0, 5);
  list.innerHTML = show.map(n => {
    const displayTitle = n.message && n.message !== n.title ? n.message : n.title;
    return `<div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markRead('${n.id}', this)">
      ${notifIcon(n.type)}
      <div class="notif-content">
        <div class="notif-title">${notifTypeBadge(n.type)}${displayTitle}</div>
        <div class="notif-time">${timeAgo(n.created_at)}</div>
      </div>
    </div>`;
  }).join('') + `<a class="notif-view-all" href="javascript:void(0)" onclick="switchSection('notifications');toggleNotifDropdown(event);">View all notifications</a>`;

  const unread = notifications.filter(n => !n.is_read).length;
  const badge = document.getElementById('notifBadge');
  badge.textContent = unread > 0 ? (unread > 9 ? '9+' : unread) : '';
}

async function loadNotifications() {
  try {
    const { data, error } = await sb.from('notifications')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('recipient_type', 'customer')
      .eq('is_read', false)
      .order('created_at', { ascending: false })
      .limit(20);
    if (error) throw error;
    renderNotifications(data || []);
  } catch(e) {
    console.warn('Failed to load notifications:', e);
  }
}

async function markRead(id, el) {
  if (el) el.classList.remove('unread');
  try {
    await sb.from('notifications').update({ is_read: true }).eq('id', id);
    const badge = document.getElementById('notifBadge');
    const current = parseInt(badge.textContent) || 0;
    if (current > 1) badge.textContent = current - 1;
    else badge.textContent = '';
  } catch(e) { console.warn('markRead error:', e); }
}

async function markAllRead(e) {
  e.stopPropagation();
  try {
    await sb.from('notifications')
      .update({ is_read: true })
      .eq('user_id', currentUser.id)
      .eq('is_read', false);
    document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
    document.getElementById('notifBadge').textContent = '';
  } catch(e) { console.warn('markAllRead error:', e); }
}

function setupNotifRealtime() {
  sb.channel('notif-admin')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${currentUser.id}`,
    }, (payload) => {
      loadNotifications();
      // Also refresh page view if visible
      if (document.getElementById('section-notifications')?.classList.contains('active')) loadNotifPage();
    })
    .subscribe();
}

/* ── Notifications Full Page ─────────────────────────── */
let notifPageFilter = 'all'; // 'all' | 'unread' | 'read'

function setNotifFilter(filter, btn) {
  notifPageFilter = filter;
  document.querySelectorAll('.notif-filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadNotifPage();
}

function getNotifPeriodRange() {
  const sel = document.getElementById('notifPeriodFilter')?.value || 'this_month';
  const picker = document.getElementById('notifMonthPicker');
  const now = new Date();

  if (sel === 'this_month') {
    picker.style.display = 'none';
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    return { from: start.toISOString(), to: null };
  }
  if (sel === 'this_year') {
    picker.style.display = 'none';
    const start = new Date(now.getFullYear(), 0, 1);
    return { from: start.toISOString(), to: null };
  }
  // custom month
  picker.style.display = '';
  const val = picker.value; // "2026-03"
  if (!val) return { from: null, to: null };
  const [y, m] = val.split('-').map(Number);
  const start = new Date(y, m - 1, 1);
  const end = new Date(y, m, 1);
  return { from: start.toISOString(), to: end.toISOString() };
}

async function loadNotifPage() {
  if (!currentUser) return;
  const list = document.getElementById('notifPageList');
  list.innerHTML = '<div style="padding:32px;text-align:center;color:#aaa;font-size:13px;">Loading…</div>';

  try {
    let query = sb.from('notifications')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('recipient_type', 'customer')
      .order('created_at', { ascending: false })
      .limit(100);

    if (notifPageFilter === 'unread') query = query.eq('is_read', false);
    if (notifPageFilter === 'read') query = query.eq('is_read', true);

    const range = getNotifPeriodRange();
    if (range.from) query = query.gte('created_at', range.from);
    if (range.to) query = query.lt('created_at', range.to);

    const { data, error } = await query;
    if (error) throw error;
    renderNotifPage(data || []);
  } catch(e) {
    list.innerHTML = '<div style="padding:32px;text-align:center;color:#e74c3c;font-size:13px;">Failed to load notifications.</div>';
    console.error('loadNotifPage error:', e);
  }
}

function renderNotifPage(items) {
  const list = document.getElementById('notifPageList');
  if (!items.length) {
    list.innerHTML = '<div style="padding:48px 32px;text-align:center;"><div style="font-size:32px;margin-bottom:12px;">🔔</div><div style="color:#aaa;font-size:14px;">No notifications found</div></div>';
    return;
  }

  list.innerHTML = items.map(n => {
    const icon = notifIcon(n.type);
    const time = new Date(n.created_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    const unread = n.is_read ? '' : ' unread';
    return `<div class="notif-page-item${unread}" data-id="${n.id}">
      ${icon}
      <div class="np-content">
        <div class="np-title">${notifTypeBadge(n.type)}${n.message && n.message !== n.title ? n.message : (n.title || 'Notification')}</div>
        <div class="np-time">${time}</div>
      </div>
      <div class="np-actions">
        ${!n.is_read ? `<button onclick="markReadPage('${n.id}',this)" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-family:inherit;color:var(--text-light);cursor:pointer;" title="Mark as read">✓</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function markReadPage(id, btn) {
  try {
    await sb.from('notifications').update({ is_read: true }).eq('id', id);
    const item = btn.closest('.notif-page-item');
    if (item) { item.classList.remove('unread'); btn.remove(); }
    // Also update bell badge
    loadNotifications();
  } catch(e) { console.warn('markReadPage error:', e); }
}

async function markAllReadPage() {
  try {
    await sb.from('notifications')
      .update({ is_read: true })
      .eq('user_id', currentUser.id)
      .eq('is_read', false);
    document.querySelectorAll('.notif-page-item.unread').forEach(el => el.classList.remove('unread'));
    document.querySelectorAll('.notif-page-item .np-actions button').forEach(b => b.remove());
    loadNotifications(); // refresh bell badge
    showToast('All notifications marked as read.');
  } catch(e) { console.warn('markAllReadPage error:', e); }
}

</script>
<script>


/* ══ Payments Section ════════════════════════════════════════════════ */

let allPaymentsData = [];
let currentRefundPayment = null;
let allSubscribersForCharge = [];

const PLAN_MONTHLY = { essential: 55, smart: 75, premium: 150 };

function onPayPeriodChange() {
  const type = document.getElementById('payPeriodType').value;
  document.getElementById('payYear').style.display = type !== 'all' ? 'inline-block' : 'none';
  document.getElementById('payMonth').style.display = type === 'month' ? 'inline-block' : 'none';
  loadPaymentsSection();
}

async function loadPaymentsSection() {
  const tbody = document.getElementById('payTableBody');
  tbody.innerHTML = '<tr><td colspan="8" class="pay-empty">Loading...</td></tr>';

  try {
    // 기간 필터 계산
    const periodType = document.getElementById('payPeriodType').value;
    const year = parseInt(document.getElementById('payYear').value);
    const month = parseInt(document.getElementById('payMonth').value);
    const statusFilter = document.getElementById('payStatus').value;

    let query = sb.from('payments')
      .select('*, profiles:user_id(full_name), subscriptions:subscription_id(plan_type, stripe_customer_id)')
      .order('paid_at', { ascending: false });

    if (periodType === 'year') {
      query = query.gte('paid_at', `${year}-01-01`).lt('paid_at', `${year+1}-01-01`);
    } else if (periodType === 'month') {
      const nextMonth = month === 12 ? 1 : month + 1;
      const nextYear = month === 12 ? year + 1 : year;
      const pad = n => String(n).padStart(2, '0');
      query = query.gte('paid_at', `${year}-${pad(month)}-01`).lt('paid_at', `${nextYear}-${pad(nextMonth)}-01`);
    }

    if (statusFilter !== 'all') {
      query = query.eq('status', statusFilter);
    }

    const { data, error } = await query.limit(200);
    if (error) throw error;

    allPaymentsData = data || [];
    renderPaymentsTable(allPaymentsData);
    renderPaymentsSummary(allPaymentsData);

  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="8" class="pay-empty">Error: ${e.message}</td></tr>`;
  }
}

function renderPaymentsSummary(data) {
  const revenue = data.filter(p => p.payment_type !== 'refund').reduce((s, p) => s + parseFloat(p.amount || 0), 0);
  const fees = data.reduce((s, p) => s + parseFloat(p.stripe_fee || 0), 0);
  const net = data.reduce((s, p) => s + parseFloat(p.net_amount || 0), 0);
  const refunded = data.reduce((s, p) => s + parseFloat(p.refund_amount || 0), 0);

  document.getElementById('payTotalRevenue').textContent = `$${revenue.toFixed(2)}`;
  document.getElementById('payTotalFees').textContent = `$${fees.toFixed(2)}`;
  document.getElementById('payTotalNet').textContent = `$${net.toFixed(2)}`;
  document.getElementById('payTotalRefunded').textContent = refunded > 0 ? `-$${refunded.toFixed(2)}` : '$0.00';
}

function renderPaymentsTable(data) {
  const tbody = document.getElementById('payTableBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="pay-empty">No payment records found.</td></tr>';
    return;
  }

  const typeLabel = {
    subscription: 'Subscription', sh_bundle: 'SH Bundle',
    refund: 'Refund', additional_charge: 'Additional Charge'
  };

  tbody.innerHTML = data.map(p => {
    const date = new Date(p.paid_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    const customer = p.profiles?.full_name || '—';
    const type = typeLabel[p.payment_type] || p.payment_type;
    const shSize = p.sh_bundle_size ? ` (${p.sh_bundle_size}h)` : '';
    const amount = `$${parseFloat(p.amount || 0).toFixed(2)}`;
    const fee = p.stripe_fee ? `$${parseFloat(p.stripe_fee).toFixed(2)}` : '—';
    const net = p.net_amount ? `$${parseFloat(p.net_amount).toFixed(2)}` : '—';
    const status = p.status || 'paid';
    const refundInfo = p.refund_amount ? `<br><small style="color:#e65100">Refunded: -$${parseFloat(p.refund_amount).toFixed(2)}</small>` : '';

    const canRefund = p.stripe_charge_id && !['refunded', 'cancelled'].includes(p.status) && p.payment_type !== 'additional_charge';

    return `<tr>
      <td style="white-space:nowrap">${date}</td>
      <td>${customer}</td>
      <td><span class="pay-type-badge">${type}${shSize}</span></td>
      <td>${amount}${refundInfo}</td>
      <td style="color:#888">${fee}</td>
      <td style="font-weight:700">${net}</td>
      <td><span class="pay-badge ${status}">${status.replace('_', ' ')}</span></td>
      <td>
        ${canRefund ? `<button class="pay-btn refund" onclick="openRefundModal('${p.id}')">Refund</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

// ── 환불 모달 ──
async function openRefundModal(paymentId) {
  const payment = allPaymentsData.find(p => p.id === paymentId);
  if (!payment) return;

  currentRefundPayment = payment;

  document.getElementById('refundCustomer').textContent = payment.profiles?.full_name || '—';
  document.getElementById('refundOriginal').textContent =
    `${payment.payment_type === 'sh_bundle' ? 'SH Bundle' : 'Subscription'} — $${parseFloat(payment.amount).toFixed(2)} on ${new Date(payment.paid_at).toLocaleDateString('en-AU')}`;

  document.getElementById('refundAmount').value = '';
  document.getElementById('refundReason').value = '';
  document.getElementById('refundCalc').textContent = 'Select refund type to calculate amount.';

  document.getElementById('refundModal').style.display = 'flex';
  onRefundTypeChange();
}

function closeRefundModal() {
  document.getElementById('refundModal').style.display = 'none';
  currentRefundPayment = null;
}

async function onRefundTypeChange() {
  if (!currentRefundPayment) return;
  const type = document.getElementById('refundType').value;
  const p = currentRefundPayment;
  const amount = parseFloat(p.amount);
  const calcEl = document.getElementById('refundCalc');
  const amountEl = document.getElementById('refundAmount');

  if (type === 'cooling_off') {
    amountEl.value = amount.toFixed(2);
    amountEl.readOnly = true;
    calcEl.innerHTML = `<strong>Cooling-off (within 30 days)</strong><br>Full refund: <strong>$${amount.toFixed(2)}</strong>`;

  } else if (type === 'sh_bundle') {
    // SH번들: 잔여SH × $99
    const { data: sub } = await sb.from('subscriptions').select('sh_hours_total, sh_hours_used').eq('id', p.subscription_id).maybeSingle();
    if (sub) {
      const remaining = Math.max(0, parseFloat(sub.sh_hours_total) - parseFloat(sub.sh_hours_used || 0));
      const bundleSize = p.sh_bundle_size || 0;
      const usedSH = bundleSize - remaining;
      const usedCost = usedSH * 99;
      const refund = Math.max(0, amount - usedCost);
      amountEl.value = refund.toFixed(2);
      amountEl.readOnly = true;
      calcEl.innerHTML = `<strong>SH Bundle Refund</strong><br>
        Bundle: ${bundleSize} SH ($${amount.toFixed(2)})<br>
        Used: ${usedSH.toFixed(2)} SH × $99 = $${usedCost.toFixed(2)}<br>
        Remaining: ${remaining.toFixed(2)} SH<br>
        <strong>Refund: $${refund.toFixed(2)}</strong>`;
    }

  } else if (type === 'subscription_cancel') {
    // 구독 취소: 경과월 계산
    const { data: sub } = await sb.from('subscriptions').select('start_date, plan_type').eq('id', p.subscription_id).maybeSingle();
    if (sub) {
      const start = new Date(sub.start_date);
      const now = new Date();
      const diffMs = now - start;
      const elapsedMonths = Math.ceil(diffMs / (1000 * 60 * 60 * 24 * 30.44));
      const remaining = Math.max(0, 12 - elapsedMonths);
      const monthly = PLAN_MONTHLY[sub.plan_type] || 0;

      let termFee = 0;
      let termFeeNote = '';
      if (elapsedMonths <= 1) {
        termFeeNote = 'Within cooling-off — no termination fee';
      } else if (elapsedMonths <= 6) {
        termFee = remaining * monthly * 0.2;
        termFeeNote = `${remaining} months × $${monthly} × 20% = $${termFee.toFixed(2)}`;
      } else {
        termFee = remaining * monthly * 0.1;
        termFeeNote = `${remaining} months × $${monthly} × 10% = $${termFee.toFixed(2)}`;
      }

      // 월납이면 환불 $0, 연납이면 잔여월 환불
      const isAnnual = amount >= monthly * 10;
      const subRefund = isAnnual ? remaining * (amount / 12) : 0;
      const netRefund = Math.max(0, subRefund - termFee);

      amountEl.value = netRefund.toFixed(2);
      amountEl.readOnly = true;
      calcEl.innerHTML = `<strong>Subscription Cancel</strong><br>
        Plan: ${sub.plan_type} / ${isAnnual ? 'Annual' : 'Monthly'}<br>
        Elapsed: ${elapsedMonths} months / Remaining: ${remaining} months<br>
        Subscription refund: $${subRefund.toFixed(2)}<br>
        Early termination fee: ${termFeeNote}<br>
        <strong>Net Refund: $${netRefund.toFixed(2)}</strong>`;
    }

  } else {
    amountEl.readOnly = false;
    calcEl.textContent = 'Enter custom amount below.';
  }
}

async function executeRefund() {
  const btn = document.getElementById('refundConfirmBtn');
  const amount = parseFloat(document.getElementById('refundAmount').value);
  const reason = document.getElementById('refundReason').value.trim();

  if (!amount || amount <= 0) { showToast('Enter a valid refund amount', 'error'); return; }
  if (!reason) { showToast('Please enter a reason', 'error'); return; }
  if (!confirm(`Process refund of $${amount.toFixed(2)} AUD?

This cannot be undone.`)) return;

  btn.disabled = true; btn.textContent = 'Processing...';

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/process-refund', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({
        action: 'refund',
        payment_id: currentRefundPayment.id,
        refund_amount: amount,
        refund_reason: reason,
      }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Refund failed');

    showToast(`Refund of $${amount.toFixed(2)} processed successfully`);
    closeRefundModal();
    setTimeout(loadPaymentsSection, 2000);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Process Refund';
  }
}

// ── 추가 납부 모달 ──
async function openAdditionalChargeModal() {
  // 고객 목록 로드
  const { data } = await sb.from('subscriptions')
    .select('user_id, plan_type, stripe_customer_id, start_date, profiles:user_id(full_name)')
    .eq('status', 'active');

  allSubscribersForCharge = data || [];
  const sel = document.getElementById('chargeCustomer');
  sel.innerHTML = '<option value="">Select customer...</option>' +
    allSubscribersForCharge.map(s => `<option value="${s.stripe_customer_id}">${s.profiles?.full_name || s.user_id} — ${s.plan_type}</option>`).join('');

  document.getElementById('chargeAmount').value = '';
  document.getElementById('chargeDescription').value = '';
  document.getElementById('chargeCalc').style.display = 'none';
  document.getElementById('additionalChargeModal').style.display = 'flex';
}

function closeAdditionalChargeModal() {
  document.getElementById('additionalChargeModal').style.display = 'none';
}

function onChargeCustomerChange() {
  const stripeId = document.getElementById('chargeCustomer').value;
  const sub = allSubscribersForCharge.find(s => s.stripe_customer_id === stripeId);
  if (!sub) return;

  const start = new Date(sub.start_date);
  const now = new Date();
  const elapsedMonths = Math.ceil((now - start) / (1000 * 60 * 60 * 24 * 30.44));
  const remaining = Math.max(0, 12 - elapsedMonths);
  const monthly = PLAN_MONTHLY[sub.plan_type] || 0;

  let termFee2to6 = remaining * monthly * 0.2;
  let termFee7to12 = remaining * monthly * 0.1;

  const calcEl = document.getElementById('chargeCalc');
  calcEl.style.display = 'block';
  calcEl.innerHTML = `<strong>Early Termination Fee Reference</strong><br>
    Plan: ${sub.plan_type} / Elapsed: ${elapsedMonths}m / Remaining: ${remaining}m<br>
    Month 2-6: $${termFee2to6.toFixed(2)} | Month 7-12: $${termFee7to12.toFixed(2)}`;
}

async function executeAdditionalCharge() {
  const btn = document.getElementById('chargeConfirmBtn');
  const stripeId = document.getElementById('chargeCustomer').value;
  const amount = parseFloat(document.getElementById('chargeAmount').value);
  const desc = document.getElementById('chargeDescription').value.trim();

  if (!stripeId) { showToast('Select a customer', 'error'); return; }
  if (!amount || amount <= 0) { showToast('Enter a valid amount', 'error'); return; }
  if (!desc) { showToast('Enter a description', 'error'); return; }
  if (!confirm(`Send invoice of $${amount.toFixed(2)} AUD to customer?`)) return;

  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/process-refund', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({
        action: 'additional_charge',
        customer_stripe_id: stripeId,
        additional_amount: amount,
        description: desc,
      }),
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Failed');

    showToast(`Invoice sent successfully — $${amount.toFixed(2)}`);
    closeAdditionalChargeModal();
    loadPaymentsSection();
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Send Invoice';
  }
}


</script>
