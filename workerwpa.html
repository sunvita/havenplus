<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Haven Plus — Worker App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2A4A; --navy-light: #2a3f6a;
  --orange: #ff6b35; --bg: #f5f6fa;
  --surface: #ffffff; --border: #e8eaed;
  --text: #1a1a1a; --text-light: #666;
  --green: #059669; --green-bg: #ecfdf5;
  --red: #dc2626; --red-bg: #fef2f2;
  --blue: #2563eb; --blue-bg: #eff6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

.app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--surface); display: flex; flex-direction: column; position: relative; }

/* ═══ Login Screen ═══ */
.login-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.login-logo { margin-bottom: 32px; }
.login-logo svg { width: 72px; height: 72px; }
.login-title { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
.login-subtitle { font-size: 14px; color: var(--text-light); margin-bottom: 32px; }
.login-form { width: 100%; max-width: 280px; }
.login-input { width: 100%; padding: 14px 16px; font-size: 20px; font-family: inherit; font-weight: 700; text-align: center; letter-spacing: 6px; text-transform: uppercase; border: 2px solid var(--border); border-radius: 12px; outline: none; transition: border-color .2s; background: var(--surface); }
.login-input:focus { border-color: var(--orange); }
.login-input::placeholder { letter-spacing: 0; font-weight: 400; font-size: 14px; }
.login-btn { width: 100%; padding: 14px; margin-top: 16px; background: var(--navy); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .2s; }
.login-btn:hover { background: var(--navy-light); }
.login-btn:disabled { background: #ccc; cursor: not-allowed; }
.login-error { margin-top: 16px; padding: 12px; background: var(--red-bg); color: var(--red); border-radius: 10px; font-size: 13px; text-align: center; display: none; }
.login-error.show { display: block; }

/* ═══ Main App ═══ */
.main-app { display: none; flex-direction: column; min-height: 100vh; }
.main-app.active { display: flex; }

/* Header */
.header { background: var(--navy); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo svg { width: 28px; height: 28px; }
.header-brand { font-size: 14px; font-weight: 800; letter-spacing: .5px; }
.header-brand span { font-weight: 300; opacity: .6; }
.header-right { text-align: right; }
.header-name { font-size: 13px; font-weight: 600; }
.header-code { font-size: 11px; opacity: .7; font-family: monospace; }

/* Content */
.content { flex: 1; overflow-y: auto; padding-bottom: 70px; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* ═══ Bottom Tabs ═══ */
.bottom-tabs { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; background: none; border: none; color: var(--text-light); font-size: 10px; font-weight: 600; font-family: inherit; cursor: pointer; transition: color .2s; gap: 4px; }
.tab-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
.tab-btn.active { color: var(--navy); }
.tab-btn.active svg { stroke-width: 2.2; }

/* ═══ Today Tab ═══ */
.today-summary { background: var(--bg); border-radius: 14px; padding: 16px; margin-bottom: 20px; display: flex; justify-content: space-around; text-align: center; }
.summary-item { }
.summary-value { font-size: 28px; font-weight: 800; color: var(--navy); line-height: 1; }
.summary-label { font-size: 11px; color: var(--text-light); margin-top: 4px; text-transform: uppercase; letter-spacing: .03em; }

.section-title { font-size: 13px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* Job Card */
.job-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: all .2s; }
.job-card.next-up { border-color: var(--orange); border-width: 2px; box-shadow: 0 4px 12px rgba(255,107,53,.15); }
.job-card.in-progress { border-color: var(--green); border-width: 2px; background: var(--green-bg); }
.job-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.job-time { font-size: 13px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 6px; }
.job-time svg { width: 14px; height: 14px; }
.job-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
.job-badge.next { background: var(--orange); color: white; }
.job-badge.in-progress { background: var(--green); color: white; }
.job-address { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.job-suburb { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
.job-details { display: flex; gap: 16px; font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.job-details span { display: flex; align-items: center; gap: 4px; }
.job-earnings { font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 12px; }
.job-actions { display: flex; gap: 10px; }
.job-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.job-btn svg { width: 16px; height: 16px; }
.job-btn-nav { background: var(--bg); color: var(--navy); border: 1px solid var(--border); }
.job-btn-nav:hover { background: #e8eaed; }
.job-btn-start { background: var(--green); color: white; }
.job-btn-start:hover { background: #047857; }
.job-btn-complete { background: var(--orange); color: white; }
.job-btn-complete:hover { background: #e55a2b; }

.job-timer { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: var(--green); color: white; border-radius: 10px; margin-bottom: 12px; }
.job-timer-value { font-size: 24px; font-weight: 800; font-family: monospace; letter-spacing: 2px; }
.job-timer-label { font-size: 12px; opacity: .9; }

.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 15px; color: var(--text-light); }

/* ═══ Schedule Tab ═══ */
.schedule-day { margin-bottom: 24px; }
.schedule-day-header { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.schedule-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg); border-radius: 10px; margin-bottom: 8px; }
.schedule-time { font-size: 13px; font-weight: 700; color: var(--navy); min-width: 60px; }
.schedule-info { flex: 1; }
.schedule-address { font-size: 14px; font-weight: 600; color: var(--text); }
.schedule-suburb { font-size: 12px; color: var(--text-light); }
.schedule-earning { font-size: 13px; font-weight: 700; color: var(--green); }

/* ═══ Earnings Tab ═══ */
.earnings-card { background: var(--bg); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.earnings-card-title { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; }
.earnings-row { display: flex; justify-content: space-between; }
.earnings-box { flex: 1; text-align: center; }
.earnings-box + .earnings-box { border-left: 1px solid var(--border); }
.earnings-value { font-size: 28px; font-weight: 800; line-height: 1; }
.earnings-value.green { color: var(--green); }
.earnings-value.blue { color: var(--blue); }
.earnings-label { font-size: 11px; color: var(--text-light); margin-top: 6px; }
.earnings-jobs { font-size: 12px; color: var(--text-light); margin-top: 2px; }

.earnings-list { }
.earnings-list-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
.earnings-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.earnings-item:last-child { border-bottom: none; }
.earnings-item-left { }
.earnings-item-date { font-size: 11px; color: var(--text-light); }
.earnings-item-address { font-size: 14px; font-weight: 600; color: var(--text); }
.earnings-item-amount { font-size: 15px; font-weight: 700; color: var(--green); }
.earnings-item-amount.potential { color: var(--blue); }

/* ═══ Profile Tab ═══ */
.profile-card { background: var(--bg); border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 20px; }
.profile-avatar { width: 64px; height: 64px; background: var(--navy); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; margin: 0 auto 12px; }
.profile-name { font-size: 18px; font-weight: 700; color: var(--navy); }
.profile-code { font-size: 14px; color: var(--text-light); font-family: monospace; margin-top: 4px; }
.profile-area { display: inline-block; margin-top: 8px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

.profile-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.profile-stat { background: var(--bg); border-radius: 12px; padding: 16px; text-align: center; }
.profile-stat-value { font-size: 22px; font-weight: 800; color: var(--navy); }
.profile-stat-label { font-size: 11px; color: var(--text-light); margin-top: 4px; }

.btn-logout { width: 100%; padding: 14px; background: none; border: 2px solid var(--red); color: var(--red); border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-logout:hover { background: var(--red-bg); }

/* ═══ Modal ═══ */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: white; width: 100%; max-width: 480px; max-height: 90vh; border-radius: 20px 20px 0 0; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 17px; font-weight: 800; color: var(--navy); }
.modal-close { background: none; border: none; font-size: 24px; color: var(--text-light); cursor: pointer; padding: 0; }
.modal-body { padding: 20px; }
.modal-actions { display: flex; gap: 12px; margin-top: 20px; }
.modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.modal-btn-primary { background: var(--navy); color: white; }
.modal-btn-secondary { background: var(--bg); color: var(--text); }

/* Photo Section */
.photo-section { margin-bottom: 20px; }
.photo-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.photo-add { aspect-ratio: 1; border: 2px dashed var(--border); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: var(--bg); transition: all .2s; }
.photo-add:hover { border-color: var(--navy); }
.photo-add svg { width: 24px; height: 24px; color: var(--text-light); }
.photo-add span { font-size: 10px; color: var(--text-light); margin-top: 4px; }
.photo-item { aspect-ratio: 1; border-radius: 10px; overflow: hidden; position: relative; }
.photo-item img { width: 100%; height: 100%; object-fit: cover; }
.photo-remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,.6); color: white; border: none; border-radius: 50%; font-size: 12px; cursor: pointer; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--navy); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 300; transition: transform .3s; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }
.toast.success { background: var(--green); }

/* Area Colors */
.area-SE_INNER, .area-EAST { background: #3F51B5; color: #fff; }
.area-INNER_SOUTH, .area-SE_MID, .area-CBD { background: #2196F3; color: #fff; }
.area-SE_OUTER, .area-MELVILLE, .area-NE_INNER, .area-ARMADALE { background: #009688; color: #fff; }
.area-NE_MID, .area-WEST, .area-COCKBURN, .area-FREMANTLE { background: #4CAF50; color: #fff; }
.area-NE_OUTER, .area-NORTH_INNER { background: #FDD835; color: #333; }
.area-NORTH_OUTER { background: #FF9800; color: #fff; }
.area-ROCKINGHAM { background: #F44336; color: #fff; }
</style>
</head>
<body>

<div class="app">

    <div class="login-logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,8 85,28 85,72 50,92 15,72 15,28" stroke="#1B2A4A" stroke-width="4" fill="none"/>

let activeJobId = null, jobStartTime = null, timerInterval = null;
let photos = [];

// ═══ Init ═══
document.addEventListener('DOMContentLoaded', () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  
  // Check saved session
  const saved = localStorage.getItem('hp_worker');
  if (saved) {
    try {
      currentWorker = JSON.parse(saved);
      showMainApp();
      loadAllData();
    } catch(e) { localStorage.removeItem('hp_worker'); }
  }
  
  // Enter key for login
  document.getElementById('codeInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') handleLogin();
  });
});

// ═══ Login ═══
async function handleLogin() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  
  if (code.length !== 7) {
    errorEl.textContent = 'Code must be 7 characters';
    errorEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errorEl.classList.remove('show');
  
  try {
    const { data, error } = await sb.from('workers')
      .select('id, full_name, worker_code, area, is_active, hourly_rate, total_jobs_completed, rating')
      .eq('worker_code', code)
      .maybeSingle();
    
    if (error) throw error;
    if (!data) {
      errorEl.textContent = 'Invalid Worker Code';
      errorEl.classList.add('show');
      return;
    }
    if (!data.is_active) {
      errorEl.textContent = 'Account inactive. Contact admin.';
      errorEl.classList.add('show');
      return;
    }
    
    currentWorker = data;
    localStorage.setItem('hp_worker', JSON.stringify(data));
    showMainApp();
    loadAllData();
  } catch(e) {
    errorEl.textContent = 'Connection error. Try again.';
    errorEl.classList.add('show');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function handleLogout() {
  currentWorker = null;
  localStorage.removeItem('hp_worker');
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').classList.remove('active');
  document.getElementById('codeInput').value = '';
}

function showMainApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('active');
  
  // Header
  document.getElementById('headerName').textContent = currentWorker.full_name;
  document.getElementById('headerCode').textContent = currentWorker.worker_code;
  
  // Profile
  document.getElementById('profileAvatar').textContent = (currentWorker.full_name || '?').charAt(0);
  document.getElementById('profileName').textContent = currentWorker.full_name;
  document.getElementById('profileCode').textContent = currentWorker.worker_code;
  const areaEl = document.getElementById('profileArea');
  areaEl.textContent = currentWorker.area || 'No Area';
  areaEl.className = `profile-area area-${currentWorker.area || ''}`;
  document.getElementById('statTotal').textContent = currentWorker.total_jobs_completed || 0;
  document.getElementById('statRating').textContent = currentWorker.rating ? currentWorker.rating.toFixed(1) : '—';
}

// ═══ Tabs ═══
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
  
  if (tabId === 'tabSchedule') loadSchedule();
  if (tabId === 'tabEarnings') loadEarnings();
}

// ═══ Load Data ═══
async function loadAllData() {
  await loadTodayJobs();
}

async function loadTodayJobs() {
  const container = document.getElementById('todayJobs');
  container.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">Loading...</div></div>';
  
  try {
    const today = new Date().toISOString().split('T')[0];
    
    const { data, error } = await sb.from('cleaning_schedule')
      .select('*, properties(address, suburb, area, bedrooms, bathrooms)')
      .in('status', ['scheduled', 'confirmed', 'in_progress'])
      .eq('planned_date', today)
      .order('planned_time');
    
    if (error) throw error;
    
    // Filter for this worker
    todayJobs = (data || []).filter(job => {
      if (job.assigned_workers?.includes(currentWorker.id)) return true;
      if (job.assigned_worker_id === currentWorker.id) return true;
      return false;
    });
    
    // Update summary
    const totalHours = todayJobs.reduce((sum, j) => sum + (j.duration_hours || 2), 0);
    const rate = currentWorker.hourly_rate || HOURLY_RATE;
    const potential = totalHours * rate;
    
    document.getElementById('todayCount').textContent = todayJobs.length;
    document.getElementById('todayHours').textContent = totalHours;
    document.getElementById('todayEarnings').textContent = `$${potential}`;
    
    if (!todayJobs.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">No jobs scheduled for today!</div></div>';
      return;
    }
    
    // Find active job
    const inProgress = todayJobs.find(j => j.status === 'in_progress');
    if (inProgress?.actual_start) {
      activeJobId = inProgress.id;
      jobStartTime = new Date(inProgress.actual_start);
      startTimer();
    }
    
    container.innerHTML = todayJobs.map((job, idx) => renderJobCard(job, idx === 0 && !inProgress)).join('');
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">Failed to load</div></div>';
    console.error(e);
  }
}

function renderJobCard(job, isNext = false) {
  const prop = job.properties || {};
  const isInProgress = job.status === 'in_progress';
  const rate = currentWorker.hourly_rate || HOURLY_RATE;
  const earnings = (job.duration_hours || 2) * rate;
  const cardClass = isInProgress ? 'in-progress' : (isNext ? 'next-up' : '');
  const badge = isInProgress ? '<span class="job-badge in-progress">In Progress</span>' : (isNext ? '<span class="job-badge next">Next Up</span>' : '');
  
  let actions = '';
  if (isInProgress) {
    actions = `
      <div class="job-timer">
        <span class="job-timer-label">Elapsed:</span>
        <span class="job-timer-value" id="timer-${job.id}">00:00:00</span>
      </div>
      <div class="job-actions">
        <button class="job-btn job-btn-complete" onclick="openCompleteModal('${job.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Complete
        </button>
      </div>`;
  } else {
    actions = `
      <div class="job-actions">
        <button class="job-btn job-btn-nav" onclick="navigate('${prop.address}, ${prop.suburb}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Navigate
        </button>
        <button class="job-btn job-btn-start" onclick="startJob('${job.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start
        </button>
      </div>`;
  }
  
  return `
    <div class="job-card ${cardClass}">
      <div class="job-card-top">
        <div class="job-time">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${job.planned_time || '—'}
        </div>
        ${badge}
      </div>
      <div class="job-address">${prop.address || 'Unknown'}</div>
      <div class="job-suburb">${prop.suburb || ''}</div>
      <div class="job-details">
        <span>🛏 ${prop.bedrooms || '?'} bed</span>
        <span>🚿 ${prop.bathrooms || '?'} bath</span>
        <span>⏱ ${job.duration_hours || 2} hrs</span>
      </div>
      <div class="job-earnings">💰 $${earnings}</div>
      ${actions}
    </div>`;
}

// ═══ Schedule Tab ═══
async function loadSchedule() {
  const container = document.getElementById('scheduleContent');
  container.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div></div>';
  
  try {
    const today = new Date();
    const weekEnd = new Date(today);
    weekEnd.setDate(weekEnd.getDate() + 7);
    
    const { data, error } = await sb.from('cleaning_schedule')
      .select('*, properties(address, suburb)')
      .gte('planned_date', today.toISOString().split('T')[0])
      .lte('planned_date', weekEnd.toISOString().split('T')[0])
      .in('status', ['scheduled', 'confirmed', 'in_progress'])
      .order('planned_date')
      .order('planned_time');
    
    if (error) throw error;
    
    const jobs = (data || []).filter(job => {
      if (job.assigned_workers?.includes(currentWorker.id)) return true;
      if (job.assigned_worker_id === currentWorker.id) return true;
      return false;
    });
    
    if (!jobs.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No upcoming jobs this week</div></div>';
      return;
    }
    
    // Group by date
    const grouped = {};
    jobs.forEach(job => {
      const date = job.planned_date;
      if (!grouped[date]) grouped[date] = [];
      grouped[date].push(job);
    });
    
    const rate = currentWorker.hourly_rate || HOURLY_RATE;
    let html = '';
    
    for (const [date, dayJobs] of Object.entries(grouped)) {
      const d = new Date(date);
      const isToday = date === today.toISOString().split('T')[0];
      const dayLabel = isToday ? 'Today' : d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
      
      html += `<div class="schedule-day">
        <div class="schedule-day-header">${dayLabel}</div>
        ${dayJobs.map(job => {
          const prop = job.properties || {};
          const earnings = (job.duration_hours || 2) * rate;
          return `<div class="schedule-item">
            <div class="schedule-time">${job.planned_time || '—'}</div>
            <div class="schedule-info">
              <div class="schedule-address">${prop.address || 'Unknown'}</div>
              <div class="schedule-suburb">${prop.suburb || ''}</div>
            </div>
            <div class="schedule-earning">$${earnings}</div>
          </div>`;
        }).join('')}
      </div>`;
    }
    
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div></div>';
    console.error(e);
  }
}

// ═══ Earnings Tab ═══
async function loadEarnings() {
  try {
    const today = new Date();
    const weekStart = new Date(today);
    weekStart.setDate(weekStart.getDate() - weekStart.getDay());
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 13); // This week + next week
    
    const { data, error } = await sb.from('cleaning_schedule')
      .select('*, properties(address, suburb)')
      .gte('planned_date', weekStart.toISOString().split('T')[0])
      .lte('planned_date', weekEnd.toISOString().split('T')[0])
      .order('planned_date')
      .order('planned_time');
    
    if (error) throw error;
    
    const jobs = (data || []).filter(job => {
      if (job.assigned_workers?.includes(currentWorker.id)) return true;
      if (job.assigned_worker_id === currentWorker.id) return true;
      return false;
    });
    
    const rate = currentWorker.hourly_rate || HOURLY_RATE;
    
    // Completed this week
    const completed = jobs.filter(j => j.status === 'completed');
    const completedEarnings = completed.reduce((sum, j) => sum + ((j.duration_hours || 2) * rate), 0);
    
    // Potential (scheduled, not completed)
    const potential = jobs.filter(j => j.status !== 'completed' && j.status !== 'cancelled');
    const potentialEarnings = potential.reduce((sum, j) => sum + ((j.duration_hours || 2) * rate), 0);
    
    document.getElementById('weekCompleted').textContent = `$${completedEarnings}`;
    document.getElementById('weekCompletedJobs').textContent = `${completed.length} jobs`;
    document.getElementById('weekPotential').textContent = `$${potentialEarnings}`;
    document.getElementById('weekPotentialJobs').textContent = `${potential.length} jobs`;
    
    // Upcoming list
    const upcoming = potential.slice(0, 5);
    const upcomingEl = document.getElementById('upcomingEarnings');
    
    if (!upcoming.length) {
      upcomingEl.innerHTML = '<div style="color:var(--text-light);font-size:13px;padding:12px 0;">No upcoming jobs</div>';
    } else {
      upcomingEl.innerHTML = upcoming.map(job => {
        const prop = job.properties || {};
        const earnings = (job.duration_hours || 2) * rate;
        const d = new Date(job.planned_date);
        const isToday = job.planned_date === today.toISOString().split('T')[0];
        const dateLabel = isToday ? 'Today' : d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric' });
        
        return `<div class="earnings-item">
          <div class="earnings-item-left">
            <div class="earnings-item-date">${dateLabel} · ${job.planned_time || ''}</div>
            <div class="earnings-item-address">${prop.address || 'Unknown'}</div>
          </div>
          <div class="earnings-item-amount potential">$${earnings}</div>
        </div>`;
      }).join('');
    }
    
    // This month stats
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
    const { data: monthData } = await sb.from('cleaning_schedule')
      .select('id')
      .eq('status', 'completed')
      .gte('planned_date', monthStart);
    
    const monthJobs = (monthData || []).filter(job => {
      // We'd need to check worker assignment here too, but for simplicity:
      return true;
    });
    document.getElementById('statThisMonth').textContent = monthJobs.length;
    
  } catch(e) {
    console.error(e);
  }
}

// ═══ Job Actions ═══
async function startJob(jobId) {
  try {
    const now = new Date().toISOString();
    const { error } = await sb.from('cleaning_schedule').update({
      status: 'in_progress',
      actual_start: now
    }).eq('id', jobId);
    
    if (error) throw error;
    
    activeJobId = jobId;
    jobStartTime = new Date();
    startTimer();
    showToast('Job started!', 'success');
    loadTodayJobs();
  } catch(e) {
    showToast('Failed to start job', 'error');
    console.error(e);
  }
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  
  timerInterval = setInterval(() => {
    if (!jobStartTime || !activeJobId) return;
    const elapsed = Math.floor((Date.now() - jobStartTime.getTime()) / 1000);
    const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
    const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    const timerEl = document.getElementById(`timer-${activeJobId}`);
    if (timerEl) timerEl.textContent = `${h}:${m}:${s}`;
  }, 1000);
}

function openCompleteModal(jobId) {
  activeJobId = jobId;
  photos = [];
  updatePhotoGrid();
  document.getElementById('completeModal').classList.add('open');
}

function closeCompleteModal() {
  document.getElementById('completeModal').classList.remove('open');
}

function handlePhotos(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      photos.push(e.target.result);
      updatePhotoGrid();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function updatePhotoGrid() {
  const grid = document.getElementById('photoGrid');
  const countEl = document.getElementById('photoCount');
  const btn = document.getElementById('btnConfirmComplete');
  
  let html = photos.map((src, idx) => `
    <div class="photo-item">
      <img src="${src}">
      <button class="photo-remove" onclick="removePhoto(${idx})">×</button>
    </div>
  `).join('');
  
  html += `
    <label class="photo-add">
      <input type="file" accept="image/*" capture="environment" multiple style="display:none" onchange="handlePhotos(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Add</span>
    </label>`;
  
  grid.innerHTML = html;
  
  const valid = photos.length >= 3;
  countEl.textContent = `${photos.length} / 3 photos`;
  countEl.className = `photo-count ${valid ? 'valid' : 'invalid'}`;
  btn.disabled = !valid;
}

function removePhoto(idx) {
  photos.splice(idx, 1);
  updatePhotoGrid();
}

async function confirmComplete() {
  if (photos.length < 3) return;
  
  const btn = document.getElementById('btnConfirmComplete');
  btn.disabled = true;
  btn.textContent = 'Completing...';
  
  try {
    const now = new Date().toISOString();
    const duration = jobStartTime ? Math.round((Date.now() - jobStartTime.getTime()) / (1000 * 60 * 60) * 10) / 10 : null;
    
    const { error } = await sb.from('cleaning_schedule').update({
      status: 'completed',
      actual_end: now,
      actual_duration: duration,
      after_photos: photos
    }).eq('id', activeJobId);
    
    if (error) throw error;
    
    if (timerInterval) clearInterval(timerInterval);
    activeJobId = null;
    jobStartTime = null;
    
    closeCompleteModal();
    showToast('Job completed! 🎉', 'success');
    loadTodayJobs();
  } catch(e) {
    showToast('Failed to complete', 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Complete Job';
  }
}

function navigate(address) {
  const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
  window.open(url, '_blank');
}

// ═══ Toast ═══
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
